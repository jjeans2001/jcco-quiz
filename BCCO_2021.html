<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BCCO 2021 — JCCO Chemistry Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f4ef;--card:#fff;--card2:#f0ede5;--border:#ddd9cf;
  --text:#1c1b18;--muted:#706b5f;
  --green:#2a7a50;--green-bg:#e6f4ed;
  --red:#b83232;--red-bg:#fceaea;
  --blue:#1a4d8f;--blue-bg:#e8f0fa;
  --amber:#a05c0a;--amber-bg:#fdf2df;
  --gold:#b8860b;--gold-bg:#fdf7e3;
  --teal:#0f6e56;--teal-bg:#e1f5ee;
  --purple:#534ab7;--purple-bg:#eeedfe;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{position:sticky;top:0;z-index:200;background:var(--text);display:flex;align-items:center;justify-content:space-between;padding:12px 24px}
.logo{display:flex;align-items:center;gap:10px}
.logo-badge{background:#e8c840;color:#1c1b18;font-size:11px;font-weight:700;letter-spacing:.08em;padding:3px 8px;border-radius:5px}
.logo-title{color:#fff;font-size:14px;font-weight:500;opacity:.9}
.top-stats{display:flex;gap:16px}
.tstat{text-align:center}
.tstat .n{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}
.tstat .l{font-size:10px;opacity:.55;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.tstat .n.g{color:#5dbb87}.tstat .n.r{color:#e57373}.tstat .n.w{color:#fff}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px 80px}
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.prog-lbl{font-size:13px;color:var(--muted)}.prog-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;margin-left:auto}
.prog-bar{height:5px;background:var(--border);border-radius:3px}
.prog-fill{height:100%;background:linear-gradient(90deg,#2a7a50,#5dbb87);border-radius:3px;transition:width .4s}
.qnav-wrap{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px}
.qdot{width:33px;height:33px;border:1px solid var(--border);border-radius:7px;background:var(--card);font-size:11px;font-family:'DM Mono',monospace;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.qdot:hover{background:var(--card2)}.qdot.cur{background:var(--text);color:#fff;border-color:var(--text)}
.qdot.ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.qdot.ng{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.05);animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.qnum{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.qtag{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--blue-bg);color:var(--blue);font-weight:600}
.qdiff{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.qdiff.easy{background:var(--green-bg);color:var(--green)}.qdiff.medium{background:var(--amber-bg);color:var(--amber)}.qdiff.hard{background:var(--red-bg);color:var(--red)}
.qyear{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--gold-bg);color:var(--gold);font-weight:700}
.qen{font-size:15px;line-height:1.65;color:var(--text);margin-bottom:5px}
.qth{font-size:14px;line-height:1.75;color:var(--muted);margin-bottom:18px;padding-left:12px;border-left:2px solid var(--border)}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 15px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;color:var(--text);background:var(--card);text-align:left;width:100%;transition:all .15s;line-height:1.5;font-family:'Sarabun',sans-serif}
.opt:hover:not(:disabled){background:var(--card2);border-color:#bbb6aa}
.opt .ltr{font-weight:700;font-family:'DM Mono',monospace;font-size:13px;min-width:20px;color:var(--muted);margin-top:1px;flex-shrink:0}
.opt.correct{background:var(--green-bg);border-color:var(--green)}.opt.correct .ltr{color:var(--green)}
.opt.wrong{background:var(--red-bg);border-color:var(--red)}.opt.wrong .ltr{color:var(--red)}
.opt.show-correct{background:var(--green-bg);border-color:var(--green)}.opt.show-correct .ltr{color:var(--green)}
.opt:disabled{cursor:default}
.expbox{margin-top:14px;border:1px solid var(--border);border-radius:8px;overflow:hidden;display:none}
.expbox.show{display:block}
.exphdr{padding:9px 16px;background:var(--card2);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.elang{padding:3px 10px;border-radius:10px;font-size:11px;cursor:pointer;font-weight:600;border:none;background:none;color:var(--muted);font-family:'Sarabun',sans-serif}
.elang.active{background:var(--text);color:#fff}
.expbody{padding:16px;font-size:14px;line-height:1.8;color:var(--text)}
.exp-en,.exp-th{display:none}.exp-en.on,.exp-th.on{display:block}
.ans-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:var(--green-bg);border:1px solid var(--green);color:var(--green);font-weight:700;font-size:13px;margin-bottom:10px}
.step{display:flex;gap:10px;margin:6px 0;align-items:flex-start}
.snum{min-width:22px;height:22px;background:var(--blue);color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px;flex-shrink:0}
code{font-family:'DM Mono',monospace;background:var(--card2);padding:1px 5px;border-radius:4px;font-size:13px}
.stepper{margin:14px 0 0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.stepper-header{background:var(--card2);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.stepper-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.stepper-dots{display:flex;gap:6px}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s}
.sdot.active{background:var(--blue)}.sdot.done{background:var(--green)}
.stepper-body{padding:16px}
.stepper-step{display:none}.stepper-step.on{display:block;animation:fadein .2s}
.step-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);margin-bottom:8px}
.step-text{font-size:14px;line-height:1.75;margin-bottom:10px}
.stepper-nav{display:flex;gap:8px;justify-content:flex-end;padding:8px 16px;background:var(--card2);border-top:1px solid var(--border)}
.sbtn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:var(--card);font-size:13px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:500;color:var(--text)}
.sbtn:hover{background:var(--card2)}.sbtn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}.sbtn.pri:hover{background:#133d72}
.sbtn:disabled{opacity:.35;cursor:default}
.svg-wrap{background:var(--card2);border-radius:8px;padding:12px;margin:10px 0;overflow-x:auto}
.svg-wrap svg{display:block;max-width:100%}
.img-placeholder{background:var(--amber-bg);border:2px dashed var(--amber);border-radius:8px;padding:16px;margin:12px 0;text-align:center;font-size:13px;color:var(--amber);font-weight:600}
.navrow{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:14px}
.btn{padding:10px 22px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-size:14px;font-family:'Sarabun',sans-serif;color:var(--text);cursor:pointer;transition:all .15s;font-weight:500}
.btn:hover{background:var(--card2)}.btn:disabled{opacity:.35;cursor:default}
.btn.pri{background:var(--text);color:#fff;border-color:var(--text)}.btn.pri:hover{background:#333}
.result{text-align:center;padding:50px 20px}
.result .big{font-size:72px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.result .total{font-size:22px;color:var(--muted);font-family:'DM Mono',monospace}
.result .msg{font-size:17px;margin:14px 0 28px;color:var(--muted)}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:380px;margin:0 auto 28px}
.rstat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.rstat .n{font-size:26px;font-weight:700;font-family:'DM Mono',monospace}.rstat .l{font-size:11px;color:var(--muted);margin-top:2px}
.hidden{display:none!important}
sub,sup{font-size:.72em}
</style>
</head>
<body>
  <!-- ── password gate: วางบรรทัดนี้เป็นบรรทัดแรกสุด ต่อจาก <body> ในทุกไฟล์ ── -->
<div id="gate-overlay" style="position:fixed;inset:0;z-index:9999;background:#0d1117;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:sans-serif;color:#e6edf3;padding:20px;text-align:center;">
  <p style="margin-bottom:14px;font-size:16px;">🔒 กรุณาใส่รหัสเพื่อเข้าดูเว็บไซต์</p>
  <input id="gate-input" type="password" placeholder="รหัสผ่าน" autocomplete="off" style="padding:10px 14px;border-radius:8px;border:1px solid #30363d;background:#161b22;color:#e6edf3;font-size:14px;margin-bottom:14px;width:220px;text-align:center;">
  <br>
  <button id="gate-btn" style="padding:10px 28px;border-radius:8px;border:none;background:#58a6ff;color:#0d1117;font-weight:600;cursor:pointer;font-size:14px;">เข้าเว็บไซต์</button>
  <p id="gate-error" style="color:#f85149;font-size:13px;margin-top:12px;display:none;">รหัสไม่ถูกต้อง ลองใหม่อีกครั้ง</p>
</div>
<script>
(function(){
  var PASS = "Airplane";
  var overlay = document.getElementById('gate-overlay');
  if (sessionStorage.getItem('icq_gate_ok') === '1') {
    overlay.style.display = 'none';
  } else {
    document.getElementById('gate-btn').addEventListener('click', tryUnlock);
    document.getElementById('gate-input').addEventListener('keydown', function(e){
      if (e.key === 'Enter') tryUnlock();
    });
  }
  function tryUnlock(){
    var val = document.getElementById('gate-input').value;
    if (val === PASS) {
      sessionStorage.setItem('icq_gate_ok', '1');
      overlay.style.display = 'none';
    } else {
      document.getElementById('gate-error').style.display = 'block';
      document.getElementById('gate-input').value = '';
    }
  }
})();
</script>
<!-- ── จบส่วน password gate ── -->


<div class="topbar">
  <div class="logo">
    <div class="logo-badge">BCCO</div>
    <div class="logo-title">BC Chemistry Olympiad · 2021</div>
  </div>
  <div class="top-stats">
    <div class="tstat"><div class="n w" id="h-done">0</div><div class="l">Done</div></div>
    <div class="tstat"><div class="n g" id="h-corr">0</div><div class="l">Correct</div></div>
    <div class="tstat"><div class="n r" id="h-wrong">0</div><div class="l">Wrong</div></div>
  </div>
</div>

<div class="wrap">
  <div id="quiz-view">
    <div class="prog-card">
      <div class="prog-row"><span class="prog-lbl">Progress</span><span class="prog-val" id="prog-val">0/25</span></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="qnav-wrap" id="qnav"></div>
    <div id="qarea"></div>
    <div class="navrow">
      <button class="btn" id="btn-prev" onclick="go(cur-1)">← Prev</button>
      <span id="nav-lbl" style="font-size:13px;color:var(--muted)"></span>
      <button class="btn pri" id="btn-next">Next →</button>
    </div>
  </div>
  <div id="result-view" class="result hidden"></div>
</div>

<script>
/* ── Stepper Engine ── */
const stepState={};
function makeStepper(id,steps){
  const dots=steps.map((_,i)=>`<div class="sdot" id="${id}-dot-${i}"></div>`).join('');
  const panels=steps.map((s,i)=>`<div class="stepper-step" id="${id}-step-${i}">
    <div class="step-label">${s.label}</div>
    <div class="step-text">${s.text}</div>
    ${s.svg?`<div class="svg-wrap">${s.svg}</div>`:''}
  </div>`).join('');
  return `<div class="stepper" id="${id}">
    <div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots">${dots}</div></div>
    <div class="stepper-body">${panels}</div>
    <div class="stepper-nav">
      <button class="sbtn" id="${id}-prev" onclick="stepNav('${id}',-1)" disabled>← ก่อนหน้า</button>
      <span id="${id}-counter" style="font-size:12px;color:var(--muted);align-self:center">1/${steps.length}</span>
      <button class="sbtn pri" id="${id}-next" onclick="stepNav('${id}',1)">ถัดไป →</button>
    </div>
  </div>`;
}
function initStepper(id,total){stepState[id]={cur:0,total};showStep(id,0);}
function stepNav(id,dir){const s=stepState[id];if(!s)return;s.cur=Math.max(0,Math.min(s.total-1,s.cur+dir));showStep(id,s.cur);}
function showStep(id,idx){
  const s=stepState[id];if(!s)return;
  for(let i=0;i<s.total;i++){
    const el=document.getElementById(`${id}-step-${i}`);
    const dot=document.getElementById(`${id}-dot-${i}`);
    if(el)el.classList.toggle('on',i===idx);
    if(dot){dot.className='sdot';if(i<idx)dot.classList.add('done');if(i===idx)dot.classList.add('active');}
  }
  const ctr=document.getElementById(`${id}-counter`);
  const prev=document.getElementById(`${id}-prev`);
  const next=document.getElementById(`${id}-next`);
  if(ctr)ctr.textContent=`${idx+1}/${s.total}`;
  if(prev)prev.disabled=(idx===0);
  if(next){if(idx===s.total-1){next.textContent='✓ จบแล้ว';next.disabled=true;}else{next.textContent='ถัดไป →';next.disabled=false;}}
}

/* ── Question Data ── */
const QS = [
  {
    n:1, year:'2021', topic:'Stoichiometry', diff:'easy',
    en:`The highest-grade uranium deposits in the world are found in the Athabasca Basin in Canada with an average of 18% by weight uranium. If a mine in the Athabasca Basin collects 1 metric ton (1000 kg) of ore, how many moles of uranium can be extracted from the ore?`,
    th:`แหล่งแร่ยูเรเนียมเกรดสูงที่สุดในโลกพบที่ Athabasca Basin ประเทศแคนาดา มีปริมาณยูเรเนียมเฉลี่ย 18% โดยน้ำหนัก หากเหมืองในพื้นที่นี้ขุดแร่ได้ 1 เมตริกตัน (1000 kg) จะสกัดยูเรเนียมได้กี่โมล?`,
    opts:['a) 4200','b) 420','c) 756','d) 7560','e) 4.20'],
    ans:'c',
    expEn:`<div class="ans-badge">✓ Answer: c) 756 mol</div>
<div class="step"><div class="snum">1</div><div>Mass of uranium in 1000 kg ore: 1000 kg × 0.18 = 180 kg = 180,000 g</div></div>
<div class="step"><div class="snum">2</div><div>Molar mass of U = 238.03 g/mol</div></div>
<div class="step"><div class="snum">3</div><div>Moles of U = 180,000 g ÷ 238.03 g/mol = <b>756 mol</b></div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: c) 756 mol</div>
<div class="step"><div class="snum">1</div><div>มวลยูเรเนียมในแร่ 1000 kg: 1000 × 0.18 = 180 kg = 180,000 g</div></div>
<div class="step"><div class="snum">2</div><div>มวลโมลาร์ของ U = 238.03 g/mol</div></div>
<div class="step"><div class="snum">3</div><div>จำนวนโมล = 180,000 ÷ 238.03 = <b>756 mol</b> ✓</div></div>`
  },
  {
    n:2, year:'2021', topic:'Reaction Types', diff:'easy',
    en:`Several general types of chemical reactions can occur based on what happens when going from reactants to products. What is the type of the following reaction?<br><br><b>Ca(OH)₂ + 2CH₃COOH → 2H₂O + Ca(CH₃CO₂)₂</b>`,
    th:`ปฏิกิริยาเคมีมีหลายประเภทตามการเปลี่ยนแปลงจากสารตั้งต้นเป็นผลิตภัณฑ์ ปฏิกิริยาต่อไปนี้เป็นประเภทใด?<br><br><b>Ca(OH)₂ + 2CH₃COOH → 2H₂O + Ca(CH₃CO₂)₂</b>`,
    opts:['a) Synthesis (การสังเคราะห์)','b) Single replacement (การแทนที่เดี่ยว)','c) Decomposition (การสลายตัว)','d) Neutralization (การสะเทิน)','e) Combustion (การเผาไหม้)'],
    ans:'d',
    expEn:`<div class="ans-badge">✓ Answer: d) Neutralization</div>
<div class="step"><div class="snum">1</div><div>Reactants: Ca(OH)₂ is a <b>base</b> (provides OH⁻) and CH₃COOH is an <b>acid</b> (acetic acid)</div></div>
<div class="step"><div class="snum">2</div><div>Products: H₂O (water) + Ca(CH₃CO₂)₂ (calcium acetate, a salt)</div></div>
<div class="step"><div class="snum">3</div><div>Acid + Base → Salt + Water is the definition of a <b>neutralization reaction</b></div></div>
<div class="step"><div class="snum">4</div><div>Note: The acetic acid is a weak acid but it still neutralizes the strong base Ca(OH)₂</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: d) Neutralization (การสะเทิน)</div>
<div class="step"><div class="snum">1</div><div>สารตั้งต้น: Ca(OH)₂ เป็น<b>เบส</b> (ให้ OH⁻) และ CH₃COOH เป็น<b>กรด</b> (กรดอะซิติก)</div></div>
<div class="step"><div class="snum">2</div><div>ผลิตภัณฑ์: H₂O (น้ำ) + Ca(CH₃CO₂)₂ (แคลเซียมอะซิเตต ซึ่งเป็นเกลือ)</div></div>
<div class="step"><div class="snum">3</div><div>กรด + เบส → เกลือ + น้ำ คือนิยามของ<b>ปฏิกิริยาการสะเทิน</b></div></div>`
  },
  {
    n:3, year:'2021', topic:'Solution Chemistry', diff:'easy',
    en:`Calculate the mass of potassium iodide (KI) required to prepare a 0.30 M solution in water using a 250 mL volumetric flask.`,
    th:`คำนวณมวลของโพแทสเซียมไอโอไดด์ (KI) ที่ต้องการเพื่อเตรียมสารละลาย 0.30 M ในน้ำโดยใช้ฟลาสก์วัดปริมาตร 250 mL`,
    opts:['a) 5.98 g','b) 199.2 g','c) 12.45 g','d) 49.80 g','e) 24.90 g'],
    ans:'c',
    expEn:`<div class="ans-badge">✓ Answer: c) 12.45 g</div>
<div class="step"><div class="snum">1</div><div>Moles needed = M × V = 0.30 mol/L × 0.250 L = 0.075 mol</div></div>
<div class="step"><div class="snum">2</div><div>Molar mass of KI: K(39.10) + I(126.90) = 166.00 g/mol</div></div>
<div class="step"><div class="snum">3</div><div>Mass = 0.075 mol × 166.00 g/mol = <b>12.45 g</b> ✓</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: c) 12.45 g</div>
<div class="step"><div class="snum">1</div><div>จำนวนโมลที่ต้องการ = M × V = 0.30 mol/L × 0.250 L = 0.075 mol</div></div>
<div class="step"><div class="snum">2</div><div>มวลโมลาร์ของ KI: K(39.10) + I(126.90) = 166.00 g/mol</div></div>
<div class="step"><div class="snum">3</div><div>มวล = 0.075 mol × 166.00 g/mol = <b>12.45 g</b> ✓</div></div>`
  },
  {
    n:4, year:'2021', topic:'Balancing Equations', diff:'medium',
    en:`Which of the following chemical equations is properly balanced?<br><br>a) H₂ + O₂ → H₂O<br>b) C₆H₈ + 6O₂ → 5CO₂ + 4H₂O<br>c) CH₃CH₂OH + 3O₂ → CO₂ + 3H₂O<br>d) CH₃OH + O₂ → CO₂ + 2H₂O<br>e) 2C₇H₅N₃O₆ → 3N₂ + 5H₂ + 12CO + 2C`,
    th:`สมการเคมีใดต่อไปนี้ดุลถูกต้อง?<br><br>a) H₂ + O₂ → H₂O<br>b) C₆H₈ + 6O₂ → 5CO₂ + 4H₂O<br>c) CH₃CH₂OH + 3O₂ → CO₂ + 3H₂O<br>d) CH₃OH + O₂ → CO₂ + 2H₂O<br>e) 2C₇H₅N₃O₆ → 3N₂ + 5H₂ + 12CO + 2C`,
    opts:['a) H₂ + O₂ → H₂O','b) C₆H₈ + 6O₂ → 5CO₂ + 4H₂O','c) CH₃CH₂OH + 3O₂ → CO₂ + 3H₂O','d) CH₃OH + O₂ → CO₂ + 2H₂O','e) 2C₇H₅N₃O₆ → 3N₂ + 5H₂ + 12CO + 2C'],
    ans:'e',
    expEn:`<div class="ans-badge">✓ Answer: e) 2C₇H₅N₃O₆ → 3N₂ + 5H₂ + 12CO + 2C (TNT decomposition)</div>
<div class="step"><div class="snum">1</div><div>Check option e: Left side: C=14, H=10, N=6, O=12 | Right side: N=6 ✓, H=10 ✓, C=12+2=14 ✓, O=12 ✓ → <b>Balanced!</b></div></div>
<div class="step"><div class="snum">2</div><div>Check a: H₂ + O₂ → H₂O → O not balanced (need 2H₂ + O₂ → 2H₂O)</div></div>
<div class="step"><div class="snum">3</div><div>Check d: CH₃OH + O₂ → CO₂ + 2H₂O → Left O=1+2=3; Right O=2+2=4 ❌ not balanced</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: e) TNT สลายตัว</div>
<div class="step"><div class="snum">1</div><div>ตรวจ e: ซ้าย: C=14, H=10, N=6, O=12 | ขวา: N=6✓, H=10✓, C=14✓, O=12✓ → <b>สมดุล!</b></div></div>
<div class="step"><div class="snum">2</div><div>ตรวจ a: H₂ + O₂ → H₂O ← O ไม่สมดุล (ต้องเป็น 2H₂ + O₂ → 2H₂O)</div></div>
<div class="step"><div class="snum">3</div><div>ตรวจ d: CH₃OH + O₂ → CO₂ + 2H₂O ← O ซ้าย=3, ขวา=4 ❌ ไม่สมดุล</div></div>`

  {
    n:7, year:'2021', topic:'Stoichiometry', diff:'medium',
    en:`The province of Saskatchewan is one of the world's biggest producer of potash (a source of potassium used as soil fertilizer). Potash amounts are reported in K₂O equivalent, although it never contains potassium oxide. The K₂O equivalent system is used to compare weights of fertilizers because it is only the potassium weight that matters, the weight of the anion is irrelevant. If 200 tons of K₂CO₃ were extracted from a mine, what would be the K₂O equivalent weight in tons?`,
    th:`Saskatchewan เป็นผู้ผลิตโพแทช (แหล่งโพแทสเซียมสำหรับปุ๋ย) รายใหญ่ที่สุดของโลก ปริมาณโพแทชรายงานในหน่วย K₂O equivalent แม้ไม่มี K₂O จริงในแร่ ระบบนี้ใช้เปรียบเทียบน้ำหนักปุ๋ย เพราะสิ่งสำคัญคือน้ำหนักโพแทสเซียม ไม่ใช่แอนไอออน ถ้าขุด K₂CO₃ ได้ 200 ตัน น้ำหนัก K₂O equivalent คือเท่าใด?`,
    opts:['a) 113.2 tons','b) 293.4 tons','c) 136.3 tons','d) 353.5 tons','e) 56.6 tons'],
    ans:'c',
    expEn:`<div class="ans-badge">✓ Answer: c) 136.3 tons</div>
<div class="step"><div class="snum">1</div><div>K₂CO₃ molar mass = 2(39.10) + 12.01 + 3(16.00) = 138.21 g/mol</div></div>
<div class="step"><div class="snum">2</div><div>K₂O molar mass = 2(39.10) + 16.00 = 94.20 g/mol</div></div>
<div class="step"><div class="snum">3</div><div>Each mole of K₂CO₃ has 2K, which equals 1 mole of K₂O in terms of K content</div></div>
<div class="step"><div class="snum">4</div><div>Moles K₂CO₃ = 200 tons ÷ 138.21 g/mol (proportionally). K₂O equivalent = (200 × 94.20) ÷ 138.21 = <b>136.3 tons</b></div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: c) 136.3 tons</div>
<div class="step"><div class="snum">1</div><div>มวลโมลาร์ K₂CO₃ = 2(39.10) + 12.01 + 3(16.00) = 138.21 g/mol</div></div>
<div class="step"><div class="snum">2</div><div>มวลโมลาร์ K₂O = 2(39.10) + 16.00 = 94.20 g/mol</div></div>
<div class="step"><div class="snum">3</div><div>K₂O equivalent = 200 × (94.20/138.21) = <b>136.3 tons</b> ✓</div></div>`
  },
  {
    n:8, year:'2021', topic:'Stoichiometry / Combustion', diff:'medium',
    en:`Octane rating is used as a standard measure of the performance of a car engine. The octane isomer 2,2,4-trimethylpentane (C₈H₁₈) is the 100% reference standard for octane rating and has a density of 0.690 g/cm³. If 1 litre of 2,2,4-trimethylpentane is burned in excess of oxygen (O₂), how many grams of CO₂ is produced?`,
    th:`Octane rating เป็นมาตรวัดสมรรถนะเครื่องยนต์ ไอโซเมอร์ 2,2,4-trimethylpentane (C₈H₁₈) คือมาตรฐาน 100% ของ octane rating มีความหนาแน่น 0.690 g/cm³ ถ้าเผา 2,2,4-trimethylpentane 1 ลิตร ในออกซิเจนเกินพอ จะได้ CO₂ กี่กรัม?`,
    opts:['a) 352.1 g','b) 913.8 g','c) 5520 g','d) 2127 g','e) 1791 g'],
    ans:'d',
    expEn:`<div class="ans-badge">✓ Answer: d) 2127 g</div>
<div class="step"><div class="snum">1</div><div>Combustion: C₈H₁₈ + 12.5 O₂ → 8CO₂ + 9H₂O</div></div>
<div class="step"><div class="snum">2</div><div>Mass of C₈H₁₈: 1 L = 1000 cm³ × 0.690 g/cm³ = 690 g</div></div>
<div class="step"><div class="snum">3</div><div>Molar mass C₈H₁₈ = 8(12.01) + 18(1.008) = 114.22 g/mol</div></div>
<div class="step"><div class="snum">4</div><div>Moles C₈H₁₈ = 690 ÷ 114.22 = 6.041 mol</div></div>
<div class="step"><div class="snum">5</div><div>Moles CO₂ = 8 × 6.041 = 48.33 mol → Mass CO₂ = 48.33 × 44.01 = <b>2127 g</b> ✓</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: d) 2127 g</div>
<div class="step"><div class="snum">1</div><div>สมการการเผาไหม้: C₈H₁₈ + 12.5O₂ → 8CO₂ + 9H₂O</div></div>

<div class="step"><div class="snum">3</div><div>mol C₈H₁₈ = 690 ÷ 114.22 = 6.041 mol → mol CO₂ = 8 × 6.041 = 48.33 mol</div></div>
<div class="step"><div class="snum">4</div><div>มวล CO₂ = 48.33 × 44.01 = <b>2127 g</b> ✓</div></div>`

    th:`โครงสร้างลิวอิสของ XeO₂F₂ ที่แสดงด้านล่างนี้ไม่ใช่โครงสร้างที่ดีที่สุด อธิบายโดยเลือกคำตอบที่ดีที่สุด`,
    opts:['a) The total number of electrons is incorrect','b) The central atom cannot be hypervalent','c) A terminal atom is hypervalent','d) The formal charges are calculated correctly but not minimized','e) Noble gas never make compounds'],
    ans:'a',
    expEn:`<div class="ans-badge">✓ Answer: a) The total number of electrons is incorrect</div>
<div class="step"><div class="snum">1</div><div>Total valence electrons in XeO₂F₂: Xe(8) + 2×O(6) + 2×F(7) = 8 + 12 + 14 = <b>34 electrons</b></div></div>
<div class="step"><div class="snum">2</div><div>The shown structure with O=Xe=O (two double bonds) and two lone pairs on F uses a different electron count, making the total electron count incorrect</div></div>
<div class="step"><div class="snum">3</div><div>A better Lewis structure places Xe in center with 4 bonds (2 to O, 2 to F) and 1 lone pair on Xe, using all 34 electrons correctly</div></div>
<div class="step"><div class="snum">4</div><div>Xe CAN be hypervalent (expanded octet) since it's in period 5, so option b is wrong. Noble gases DO form compounds (XeF₂, XeO₃ exist), so option e is wrong</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: a) จำนวนอิเล็กตรอนทั้งหมดไม่ถูกต้อง</div>
<div class="step"><div class="snum">1</div><div>อิเล็กตรอนวาเลนซ์รวมใน XeO₂F₂: Xe(8) + 2O(6) + 2F(7) = 34 อิเล็กตรอน</div></div>
<div class="step"><div class="snum">2</div><div>โครงสร้างที่แสดงใช้อิเล็กตรอนจำนวนไม่ถูกต้อง ทำให้ผลรวมผิดพลาด</div></div>
<div class="step"><div class="snum">3</div><div>Xe สามารถมี hypervalent (expanded octet) ได้เพราะอยู่คาบที่ 5 ดังนั้น ข้อ b ผิด และก๊าซมีตระกูลสร้างสารประกอบได้จริง (XeF₂, XeO₃) ดังนั้น ข้อ e ผิด</div></div>`
  },
  {
    n:10, year:'2021', topic:"Atomic Structure / Slater's Rule", diff:'hard',
    en:`Effective nuclear charge (Z<sub>eff</sub>) is a useful tool for understanding periodicity. Z<sub>eff</sub> is the net positive charge experienced by an electron in a polyelectronic atom. A good estimate of Z<sub>eff</sub> can be obtained using Slater's rule: Z<sub>eff</sub> = Z – S, where Z is the atomic number and S is the screening constant. In the second row, the screening value is 0.85 for a core electron and 0.35 for a valence electron. Use Slater's rule to estimate the effective nuclear charge for a valence electron in fluorine (F).`,
    th:`ประจุนิวเคลียร์ที่มีประสิทธิผล (Z<sub>eff</sub>) มีประโยชน์ในการทำความเข้าใจสมบัติตามคาบ Z<sub>eff</sub> คือประจุบวกสุทธิที่อิเล็กตรอนในอะตอมหลายอิเล็กตรอนสัมผัส ประมาณด้วยกฎ Slater: Z<sub>eff</sub> = Z – S โดยที่ Z คือเลขอะตอมและ S คือค่าคงที่การบัง ในแถวที่สอง ค่าบังสำหรับอิเล็กตรอนแกนคือ 0.85 และวาเลนซ์คือ 0.35 ใช้กฎ Slater คำนวณ Z<sub>eff</sub> ของอิเล็กตรอนวาเลนซ์ใน F`,
    opts:['a) 4.85','b) 5.20','c) 4.15','d) 3.80','e) 8.65'],
    ans:'b',
    expEn:`<div class="ans-badge">✓ Answer: b) 5.20</div>
<div class="step"><div class="snum">1</div><div>F has atomic number Z = 9. Electron configuration: 1s²2s²2p⁵</div></div>
<div class="step"><div class="snum">2</div><div>Core electrons (1s²): 2 electrons × 0.85 = 1.70</div></div>
<div class="step"><div class="snum">3</div><div>Other valence electrons (2s²2p⁴, excluding the one we analyze): 6 electrons × 0.35 = 2.10</div></div>
<div class="step"><div class="snum">4</div><div>S = 1.70 + 2.10 = 3.80</div></div>
<div class="step"><div class="snum">5</div><div>Z<sub>eff</sub> = Z − S = 9 − 3.80 = <b>5.20</b> ✓</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: b) 5.20</div>
<div class="step"><div class="snum">1</div><div>F มี Z = 9 การจัดเรียงอิเล็กตรอน: 1s²2s²2p⁵</div></div>
<div class="step"><div class="snum">2</div><div>อิเล็กตรอนแกน (1s²): 2 × 0.85 = 1.70</div></div>
<div class="step"><div class="snum">3</div><div>อิเล็กตรอนวาเลนซ์อื่นๆ (อีก 6 ตัว): 6 × 0.35 = 2.10</div></div>
<div class="step"><div class="snum">4</div><div>S = 1.70 + 2.10 = 3.80 → Z<sub>eff</sub> = 9 − 3.80 = <b>5.20</b> ✓</div></div>`
  },

    n:11, year:'2021', topic:'Gas Laws', diff:'medium',
    en:`To study weather phenomena one uses sensors carried by balloons. On a beautiful summer day when the temperature on the ground is 25 °C and the pressure is 101.325 kPa, a balloon is partially inflated with 70 m³ of helium. The balloon is released and climbs to an altitude of 10 kilometers. Calculate the volume of the balloon if the temperature has dropped to -50.0 °C and the pressure to 27.5 kPa. Assume ideal gas behavior.`,
    th:`การศึกษาปรากฏการณ์อากาศใช้เซ็นเซอร์ที่ติดกับบอลลูน วันฤดูร้อนที่อากาศดี อุณหภูมิบนพื้น 25°C ความดัน 101.325 kPa บอลลูนบรรจุฮีเลียม 70 m³ บอลลูนลอยสูงขึ้น 10 กิโลเมตร คำนวณปริมาตรบอลลูนที่อุณหภูมิ -50.0°C และความดัน 27.5 kPa (สมมติพฤติกรรมก๊าซอุดมคติ)`,
    opts:['a) 193.0 m³','b) 93.4 m³','c) 52.4 m³','d) 25.4 m³','e) 257.9 m³'],
    ans:'a',
    expEn:`<div class="ans-badge">✓ Answer: a) 193.0 m³</div>
<div class="step"><div class="snum">1</div><div>Combined gas law: P₁V₁/T₁ = P₂V₂/T₂</div></div>
<div class="step"><div class="snum">2</div><div>P₁ = 101.325 kPa, V₁ = 70 m³, T₁ = 25 + 273.15 = 298.15 K</div></div>
<div class="step"><div class="snum">3</div><div>P₂ = 27.5 kPa, T₂ = −50 + 273.15 = 223.15 K</div></div>
<div class="step"><div class="snum">4</div><div>V₂ = P₁V₁T₂ / (T₁P₂) = (101.325 × 70 × 223.15) / (298.15 × 27.5) = <b>193.0 m³</b> ✓</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: a) 193.0 m³</div>
<div class="step"><div class="snum">1</div><div>กฎก๊าซรวม: P₁V₁/T₁ = P₂V₂/T₂</div></div>
<div class="step"><div class="snum">2</div><div>P₁=101.325 kPa, V₁=70 m³, T₁=298.15 K | P₂=27.5 kPa, T₂=223.15 K</div></div>
<div class="step"><div class="snum">3</div><div>V₂ = (101.325 × 70 × 223.15) / (298.15 × 27.5) = <b>193.0 m³</b> ✓</div></div>`
  },
  {
    n:12, year:'2021', topic:'VSEPR / Molecular Geometry', diff:'easy',
    en:`What is the molecular geometry of NH₃?`,
    th:`รูปร่างโมเลกุลของ NH₃ คืออะไร?`,
    opts:['a) Trigonal Planar (สามเหลี่ยมแบน)','b) Trigonal Bipyramidal (ปิรามิดคู่สามเหลี่ยม)','c) Square Pyramidal (ปิรามิดฐานสี่เหลี่ยม)','d) Trigonal pyramidal (ปิรามิดสามเหลี่ยม)','e) Tetrahedral (จัตุรมุข)'],
    ans:'d',
    expEn:`<div class="ans-badge">✓ Answer: d) Trigonal pyramidal</div>
<div class="step"><div class="snum">1</div><div>N in NH₃: 5 valence electrons − 3 bonding pairs = 1 lone pair. Total electron groups = 4 (tetrahedral arrangement)</div></div>
<div class="step"><div class="snum">2</div><div>But <b>molecular geometry</b> only considers atom positions, not lone pairs. With 3 bonds + 1 lone pair → <b>Trigonal pyramidal</b></div></div>
<div class="step"><div class="snum">3</div><div>Contrast: BF₃ has 3 bonds + 0 lone pairs → Trigonal planar. The lone pair in NH₃ pushes bonds downward forming a pyramid shape</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: d) Trigonal pyramidal (ปิรามิดสามเหลี่ยม)</div>
<div class="step"><div class="snum">1</div><div>N ใน NH₃: วาเลนซ์อิเล็กตรอน 5 ลบ 3 พันธะ = lone pair 1 คู่ กลุ่มอิเล็กตรอนรวม 4 กลุ่ม (จัตุรมุข)</div></div>
<div class="step"><div class="snum">2</div><div>รูปร่างโมเลกุลพิจารณาเฉพาะตำแหน่งอะตอม: 3 พันธะ + 1 lone pair → <b>Trigonal pyramidal</b></div></div>
<div class="step"><div class="snum">3</div><div>Lone pair ดันพันธะลงด้านล่าง ทำให้เกิดรูปร่างปิรามิด ต่างจาก BF₃ ที่ไม่มี lone pair จึงเป็น Trigonal planar</div></div>`
  },

    n:14, year:'2021', topic:'Electrochemistry / Stoichiometry', diff:'hard',
    en:`Electroplating has many useful applications. It can improve a metal's surface appearance, electrical conductivity or anti-corrosion properties. 49.2 g of a copper salt is dissolved in 250 mL of water and the solution is used for electroplating until all the copper is reduced. After the experiment it is found that the cathode weight has increased by exactly 14.0 g. What is the chemical formula of the copper salt used?`,
    th:`การชุบโลหะด้วยไฟฟ้ามีประโยชน์มาก ช่วยปรับปรุงรูปลักษณ์ ความนำไฟฟ้า หรือสมบัติต้านการกัดกร่อน ละลายเกลือทองแดง 49.2 g ใน 250 mL น้ำ แล้วใช้ชุบโลหะจนทองแดงถูกรีดิวซ์ทั้งหมด หลังทดลองพบว่าน้ำหนักแคโทดเพิ่มขึ้น 14.0 g สูตรเคมีของเกลือทองแดงคืออะไร?`,
    opts:['a) CuCl₂','b) CuSO₄','c) CuSO₃','d) CuBr₂','e) Cu(NO₃)₂'],
    ans:'d',
    expEn:`<div class="ans-badge">✓ Answer: d) CuBr₂</div>
<div class="step"><div class="snum">1</div><div>Mass of Cu deposited = 14.0 g → moles of Cu = 14.0 ÷ 63.55 = 0.2203 mol</div></div>
<div class="step"><div class="snum">2</div><div>Since all copper came from 49.2 g salt, molar mass of salt = 49.2 g ÷ 0.2203 mol = 223.3 g/mol</div></div>
<div class="step"><div class="snum">3</div><div>Check each: CuCl₂ = 134.5, CuSO₄ = 159.6, CuSO₃ = 143.6, <b>CuBr₂ = 223.4 ✓</b>, Cu(NO₃)₂ = 187.6</div></div>
<div class="step"><div class="snum">4</div><div>CuBr₂: Cu(63.55) + 2×Br(79.90) = 223.35 g/mol → matches perfectly!</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: d) CuBr₂</div>
<div class="step"><div class="snum">1</div><div>mol Cu ที่ชุบลง = 14.0 ÷ 63.55 = 0.2203 mol</div></div>
<div class="step"><div class="snum">2</div><div>มวลโมลาร์เกลือ = 49.2 ÷ 0.2203 = 223.3 g/mol</div></div>
<div class="step"><div class="snum">3</div><div>ตรวจ: <b>CuBr₂ = 63.55 + 2(79.90) = 223.35 g/mol ✓</b> ตรงเป๊ะ</div></div>`
  },

    en:`After the earthquake and tsunami disaster, the soil, the air, and the water near the Fukushima Daiichi Nuclear Power Plant in Japan were found to be contaminated with radioactive ¹³⁷Cs, which has a half-life of 30.1 years. Radioactive decay is a first order process. How many years must pass before the radioactivity drops to 12.5% of its initial value?`,

<div class="step"><div class="snum">3</div><div>ตรวจสอบ: ครึ่งชีวิตที่ 1 → 50%, ที่ 2 → 25%, ที่ 3 → 12.5% ✓</div></div>`

  {
    n:17, year:'2021', topic:'Acid-Base / pH', diff:'medium',
    en:`Sodium benzoate is produced by the neutralization of benzoic acid and is commonly used as a pH adjustor and preservative in food. Benzoic acid has a pKa of 4.2 and is an aromatic carboxylic acid. What is the pH of a 0.10 M solution of benzoic acid?`,
    th:`โซเดียมเบนโซเอตผลิตจากการสะเทินกรดเบนโซอิก ใช้เป็นตัวปรับ pH และสารกันบูดในอาหาร กรดเบนโซอิกมี pKa = 4.2 เป็นกรดคาร์บอกซิลิกอะโรมาติก pH ของสารละลายกรดเบนโซอิก 0.10 M คือเท่าใด?`,
    opts:['a) 2.6','b) 3.1','c) 3.6','d) 5.2','e) 1.0'],
    ans:'a',
    expEn:`<div class="ans-badge">✓ Answer: a) 2.6</div>
<div class="step"><div class="snum">1</div><div>Ka = 10^(−pKa) = 10^(−4.2) = 6.31 × 10⁻⁵</div></div>
<div class="step"><div class="snum">2</div><div>For weak acid: Ka = x²/(C−x) ≈ x²/C (when x << C)</div></div>
<div class="step"><div class="snum">3</div><div>x = [H⁺] = √(Ka × C) = √(6.31×10⁻⁵ × 0.10) = √(6.31×10⁻⁶) = 2.51 × 10⁻³ M</div></div>
<div class="step"><div class="snum">4</div><div>pH = −log(2.51×10⁻³) = 3 − log(2.51) = 3 − 0.40 = <b>2.6</b> ✓</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: a) 2.6</div>
<div class="step"><div class="snum">1</div><div>Ka = 10^(−4.2) = 6.31 × 10⁻⁵</div></div>
<div class="step"><div class="snum">2</div><div>[H⁺] = √(Ka × C) = √(6.31×10⁻⁵ × 0.10) = 2.51 × 10⁻³ M</div></div>
<div class="step"><div class="snum">3</div><div>pH = −log(2.51×10⁻³) = <b>2.6</b> ✓</div></div>`
  },

/* ── Quiz Engine ── */
let cur=0, answers={}, filtered=QS;
function updateStats(){
  const doneKeys=Object.keys(answers).filter(k=>!k.includes('_chosen'));
  const done=doneKeys.length;
  const corr=doneKeys.filter(k=>answers[k]===true).length;
  document.getElementById('h-done').textContent=done;
  document.getElementById('h-corr').textContent=corr;
  document.getElementById('h-wrong').textContent=done-corr;
  const pct=Math.round(done/filtered.length*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-val').textContent=done+'/'+filtered.length;
}
function buildNav(){
  const nav=document.getElementById('qnav'); nav.innerHTML='';
  filtered.forEach((q,i)=>{
    const d=document.createElement('button');
    d.className='qdot'+(i===cur?' cur':'')+(answers[q.n]===true?' ok':answers[q.n]===false?' ng':'');
    d.textContent=q.n; d.onclick=()=>go(i); nav.appendChild(d);
  });
}
function langClass(id,lang){
  const eb=document.getElementById(id); if(!eb) return;
  eb.querySelectorAll('.exp-en,.exp-th').forEach(e=>e.classList.remove('on'));
  eb.querySelector('.exp-'+lang)?.classList.add('on');
  eb.querySelectorAll('.elang').forEach(b=>{b.classList.remove('active');if(b.dataset.lang===lang)b.classList.add('active');});
}
function renderQ(idx){
  const q=filtered[idx]; const qa=document.getElementById('qarea');
  const answered=answers[q.n]!==undefined;
  const diffClass=q.diff==='easy'?'easy':q.diff==='medium'?'medium':'hard';
  let optsHtml=q.opts.map((o,i)=>{
    const ltr=['a','b','c','d','e'][i];
    let cls='opt';
    if(answered){
      if(ltr===q.ans) cls+=' show-correct';
      else if(answers[q.n]!==undefined && ltr===answers[q.n+'_chosen']) cls+=' wrong';
    }
    return `<button class="${cls}" ${answered?'disabled':''} onclick="choose('${q.n}','${ltr}','${q.ans}',this)">
      <span class="ltr">${ltr}</span><span>${o.replace(/^[a-e]\)\s*/,'')}</span>
    </button>`;
  }).join('');
  qa.innerHTML=`<div class="qcard">
    <div class="qmeta">
      <span class="qnum">Q${q.n}</span>
      <span class="qyear">${q.year}</span>
      <span class="qtag">${q.topic}</span>
      <span class="qdiff ${diffClass}">${q.diff}</span>
    </div>
    <div class="qen">${q.en}</div>
    <div class="qth">${q.th}</div>
    <div class="opts">${optsHtml}</div>
    ${answered?`<div class="expbox show" id="exp-${q.n}">
      <div class="exphdr">📘 Explanation
        <button class="elang active" data-lang="en" onclick="langClass('exp-${q.n}','en')">EN</button>
        <button class="elang" data-lang="th" onclick="langClass('exp-${q.n}','th')">TH</button>
      </div>
      <div class="expbody">
        <div class="exp-en on">${q.expEn}${makeStepper('st-'+q.n+'en',[
          {label:'คำอธิบายรวม',text:q.expEn}
        ])}</div>
        <div class="exp-th">${q.expTh}</div>
      </div>
    </div>`:''}
  </div>`;
  if(answered){
    ['en'].forEach(l=>initStepper('st-'+q.n+l,1));
  }
  document.getElementById('nav-lbl').textContent=(idx+1)+' / '+filtered.length;
  document.getElementById('btn-prev').disabled=(idx===0);
  const nb=document.getElementById('btn-next');
  if(idx===filtered.length-1){nb.textContent='Finish ✓';nb.onclick=showResult;}
  else{nb.textContent='Next →';nb.onclick=()=>go(cur+1);}
}
function choose(qn,chosen,correct,btn){
  const correct_ans=(chosen===correct);
  answers[qn]=correct_ans; answers[qn+'_chosen']=chosen;
  updateStats(); buildNav(); renderQ(cur);
}
function go(idx){
  if(idx<0||idx>=filtered.length) return;
  cur=idx; buildNav(); renderQ(cur);
}
function showResult(){
  document.getElementById('quiz-view').classList.add('hidden');
  const rv=document.getElementById('result-view');
  rv.classList.remove('hidden');
  const corr=Object.values(answers).filter(v=>v===true).length;
  const tot=filtered.length;
  const pct=Math.round(corr/tot*100);
  rv.innerHTML=`<div class="big" style="color:${pct>=70?'var(--green)':pct>=50?'var(--amber)':'var(--red)'}">${pct}%</div>
  <div class="total">${corr} / ${tot}</div>
  <div class="msg">${pct>=80?'ยอดเยี่ยมมาก! 🏆':pct>=60?'ดีมาก! ลองอีกครั้งนะ 💪':'ฝึกซ้อมเพิ่มเติมอีกหน่อย 📚'}</div>
  <button class="btn pri" onclick="location.reload()">ลองอีกครั้ง</button>`;
}
/* Init */
buildNav(); renderQ(0); updateStats();
</script>
</body>
</html>
