<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JCCO 2020 — 25 Questions</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f4ef;--card:#fff;--card2:#f0ede5;--border:#ddd9cf;
  --text:#1c1b18;--muted:#706b5f;
  --green:#2a7a50;--green-bg:#e6f4ed;
  --red:#b83232;--red-bg:#fceaea;
  --blue:#1a4d8f;--blue-bg:#e8f0fa;
  --amber:#a05c0a;--amber-bg:#fdf2df;
  --gold:#b8860b;--gold-bg:#fdf7e3;
  --teal:#0f6e56;--teal-bg:#e1f5ee;
  --purple:#534ab7;--purple-bg:#eeedfe;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{position:sticky;top:0;z-index:200;background:var(--text);display:flex;align-items:center;justify-content:space-between;padding:12px 24px}
.logo{display:flex;align-items:center;gap:10px}
.logo-badge{background:#e8c840;color:#1c1b18;font-size:11px;font-weight:700;letter-spacing:.08em;padding:3px 8px;border-radius:5px}
.logo-title{color:#fff;font-size:14px;font-weight:500;opacity:.9}
.top-stats{display:flex;gap:16px}
.tstat{text-align:center}
.tstat .n{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}
.tstat .l{font-size:10px;opacity:.55;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.tstat .n.g{color:#5dbb87}.tstat .n.r{color:#e57373}.tstat .n.w{color:#fff}
.year-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:49px;z-index:150}
.ytab{padding:12px 24px;font-size:14px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Sarabun',sans-serif}
.ytab:hover{color:var(--text)}.ytab.active{color:var(--text);border-bottom-color:var(--text)}
.ytab .badge{display:inline-block;margin-left:6px;background:var(--card2);color:var(--muted);font-size:10px;padding:1px 6px;border-radius:10px;font-family:'DM Mono',monospace}
.ytab.active .badge{background:var(--text);color:#fff}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px 80px}
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.prog-lbl{font-size:13px;color:var(--muted)}.prog-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;margin-left:auto}
.prog-bar{height:5px;background:var(--border);border-radius:3px}
.prog-fill{height:100%;background:linear-gradient(90deg,#2a7a50,#5dbb87);border-radius:3px;transition:width .4s}
.qnav-wrap{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px}
.qdot{width:33px;height:33px;border:1px solid var(--border);border-radius:7px;background:var(--card);font-size:11px;font-family:'DM Mono',monospace;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.qdot:hover{background:var(--card2)}.qdot.cur{background:var(--text);color:#fff;border-color:var(--text)}
.qdot.ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.qdot.ng{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.05);animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.qnum{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.qtag{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--blue-bg);color:var(--blue);font-weight:600}
.qdiff{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.qdiff.easy{background:var(--green-bg);color:var(--green)}.qdiff.medium{background:var(--amber-bg);color:var(--amber)}.qdiff.hard{background:var(--red-bg);color:var(--red)}
.qyear{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--gold-bg);color:var(--gold);font-weight:700}
.qen{font-size:15px;line-height:1.65;color:var(--text);margin-bottom:5px}
.qth{font-size:14px;line-height:1.75;color:var(--muted);margin-bottom:18px;padding-left:12px;border-left:2px solid var(--border)}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 15px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;color:var(--text);background:var(--card);text-align:left;width:100%;transition:all .15s;line-height:1.5;font-family:'Sarabun',sans-serif}
.opt:hover:not(:disabled){background:var(--card2);border-color:#bbb6aa}
.opt .ltr{font-weight:700;font-family:'DM Mono',monospace;font-size:13px;min-width:20px;color:var(--muted);margin-top:1px;flex-shrink:0}
.opt.correct{background:var(--green-bg);border-color:var(--green)}.opt.correct .ltr{color:var(--green)}
.opt.wrong{background:var(--red-bg);border-color:var(--red)}.opt.wrong .ltr{color:var(--red)}
.opt.show-correct{background:var(--green-bg);border-color:var(--green)}.opt.show-correct .ltr{color:var(--green)}
.opt:disabled{cursor:default}
.expbox{margin-top:14px;border:1px solid var(--border);border-radius:8px;overflow:hidden;display:none}
.expbox.show{display:block}
.exphdr{padding:9px 16px;background:var(--card2);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.elang{padding:3px 10px;border-radius:10px;font-size:11px;cursor:pointer;font-weight:600;border:none;background:none;color:var(--muted);font-family:'Sarabun',sans-serif}
.elang.active{background:var(--text);color:#fff}
.expbody{padding:16px;font-size:14px;line-height:1.8;color:var(--text)}
.exp-en,.exp-th{display:none}.exp-en.on,.exp-th.on{display:block}
.ans-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:var(--green-bg);border:1px solid var(--green);color:var(--green);font-weight:700;font-size:13px;margin-bottom:10px}
.step{display:flex;gap:10px;margin:6px 0;align-items:flex-start}
.snum{min-width:22px;height:22px;background:var(--blue);color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px;flex-shrink:0}
code{font-family:'DM Mono',monospace;background:var(--card2);padding:1px 5px;border-radius:4px;font-size:13px}

/* ── interactive stepper (เฉลยทีละขั้น) ── */
.stepper{margin:14px 0 0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.stepper-header{background:var(--card2);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.stepper-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.stepper-dots{display:flex;gap:6px}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s}
.sdot.active{background:var(--blue)}.sdot.done{background:var(--green)}
.stepper-body{padding:16px}
.stepper-step{display:none}.stepper-step.on{display:block;animation:fadein .2s}
.step-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);margin-bottom:8px}
.step-text{font-size:14px;line-height:1.75;margin-bottom:10px}
.stepper-nav{display:flex;gap:8px;justify-content:flex-end;padding:8px 16px;background:var(--card2);border-top:1px solid var(--border)}
.sbtn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:var(--card);font-size:13px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:500;color:var(--text)}
.sbtn:hover{background:var(--card2)}.sbtn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}.sbtn.pri:hover{background:#133d72}
.sbtn:disabled{opacity:.35;cursor:default}

/* svg diagram in stepper */
.svg-wrap{background:var(--card2);border-radius:8px;padding:12px;margin:10px 0;overflow-x:auto}
.svg-wrap svg{display:block;max-width:100%}

/* Nav buttons */
.navrow{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:14px}
.btn{padding:10px 22px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-size:14px;font-family:'Sarabun',sans-serif;color:var(--text);cursor:pointer;transition:all .15s;font-weight:500}
.btn:hover{background:var(--card2)}.btn:disabled{opacity:.35;cursor:default}
.btn.pri{background:var(--text);color:#fff;border-color:var(--text)}.btn.pri:hover{background:#333}

/* Result */
.result{text-align:center;padding:50px 20px}
.result .big{font-size:72px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.result .total{font-size:22px;color:var(--muted);font-family:'DM Mono',monospace}
.result .msg{font-size:17px;margin:14px 0 28px;color:var(--muted)}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:380px;margin:0 auto 28px}
.rstat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.rstat .n{font-size:26px;font-weight:700;font-family:'DM Mono',monospace}.rstat .l{font-size:11px;color:var(--muted);margin-top:2px}
.tbreak{max-width:480px;margin:0 auto 28px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;text-align:left}
.tbreak h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:12px}
.trow{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px}
.tname{min-width:140px}.tbar{flex:1;height:5px;background:var(--border);border-radius:3px}
.tbfill{height:100%;border-radius:3px;background:var(--green)}.tpct{min-width:38px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.hidden{display:none!important}
sub,sup{font-size:.72em}
</style>
</head>
<body>
  <!-- ── password gate: วางบรรทัดนี้เป็นบรรทัดแรกสุด ต่อจาก <body> ในทุกไฟล์ ── -->
<div id="gate-overlay" style="position:fixed;inset:0;z-index:9999;background:#0d1117;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:sans-serif;color:#e6edf3;padding:20px;text-align:center;">
  <p style="margin-bottom:14px;font-size:16px;">🔒 กรุณาใส่รหัสเพื่อเข้าดูเว็บไซต์</p>
  <input id="gate-input" type="password" placeholder="รหัสผ่าน" autocomplete="off" style="padding:10px 14px;border-radius:8px;border:1px solid #30363d;background:#161b22;color:#e6edf3;font-size:14px;margin-bottom:14px;width:220px;text-align:center;">
  <br>
  <button id="gate-btn" style="padding:10px 28px;border-radius:8px;border:none;background:#58a6ff;color:#0d1117;font-weight:600;cursor:pointer;font-size:14px;">เข้าเว็บไซต์</button>
  <p id="gate-error" style="color:#f85149;font-size:13px;margin-top:12px;display:none;">รหัสไม่ถูกต้อง ลองใหม่อีกครั้ง</p>
</div>
<script>
(function(){
  var PASS = "Airplane";
  var overlay = document.getElementById('gate-overlay');
  if (sessionStorage.getItem('icq_gate_ok') === '1') {
    overlay.style.display = 'none';
  } else {
    document.getElementById('gate-btn').addEventListener('click', tryUnlock);
    document.getElementById('gate-input').addEventListener('keydown', function(e){
      if (e.key === 'Enter') tryUnlock();
    });
  }
  function tryUnlock(){
    var val = document.getElementById('gate-input').value;
    if (val === PASS) {
      sessionStorage.setItem('icq_gate_ok', '1');
      overlay.style.display = 'none';
    } else {
      document.getElementById('gate-error').style.display = 'block';
      document.getElementById('gate-input').value = '';
    }
  }
})();
</script>

<script>

/* ── SVG helpers ── */
function svgBond(x1,y1,x2,y2,dbl){
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  const nx=-dy/len*3,ny=dx/len*3;
  let s=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="currentColor" stroke-width="1.8"/>`;
  if(dbl) s+=`<line x1="${x1+nx}" y1="${y1+ny}" x2="${x2+nx}" y2="${y2+ny}" stroke="currentColor" stroke-width="1.8"/>`;
  return s;
}
function svgAtom(x,y,lbl,fill='#e8f0fa',textCol='#0c447c',r=14){
  return `<circle cx="${x}" cy="${y}" r="${r}" fill="${fill}" stroke="#185fa5" stroke-width="0.8"/>
<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="${textCol}">${lbl}</text>`;
}
function svgWrap(content,h=220){
  return `<div class="svg-wrap"><svg width="100%" viewBox="0 0 500 ${h}" style="max-height:${h}px">${content}</svg></div>`;
}

/* ── Steppers ── shared render engine ── */
function makeStepper(id, steps){
  /* steps = [{label,text,svg?}] */
  const dots=steps.map((_,i)=>`<div class="sdot" id="${id}-dot-${i}"></div>`).join('');
  const panels=steps.map((s,i)=>{
    const svgPart=s.svg?`<div class="svg-wrap">${s.svg}</div>`:'';
    return `<div class="stepper-step" id="${id}-step-${i}">
      <div class="step-label">${s.label}</div>
      <div class="step-text">${s.text}</div>
      ${svgPart}
    </div>`;
  }).join('');
  return `<div class="stepper" id="${id}">
    <div class="stepper-header">
      <span class="stepper-title">อธิบายทีละขั้น</span>
      <div class="stepper-dots">${dots}</div>
    </div>
    <div class="stepper-body">${panels}</div>
    <div class="stepper-nav">
      <button class="sbtn" id="${id}-prev" onclick="stepNav('${id}',-1)" disabled>← ก่อนหน้า</button>
      <span id="${id}-counter" style="font-size:12px;color:var(--muted);align-self:center">1/${steps.length}</span>
      <button class="sbtn pri" id="${id}-next" onclick="stepNav('${id}',1)">ถัดไป →</button>
    </div>
  </div>`;
}

/* ── Stepper state ── */
const stepState={};
function initStepper(id,total){
  stepState[id]={cur:0,total};
  showStep(id,0);
}
function stepNav(id,dir){
  const s=stepState[id]; if(!s) return;
  s.cur=Math.max(0,Math.min(s.total-1,s.cur+dir));
  showStep(id,s.cur);
}
function showStep(id,idx){
  const s=stepState[id]; if(!s) return;
  for(let i=0;i<s.total;i++){
    const el=document.getElementById(`${id}-step-${i}`);
    const dot=document.getElementById(`${id}-dot-${i}`);
    if(el) el.classList.toggle('on',i===idx);
    if(dot){dot.className='sdot'; if(i<idx)dot.classList.add('done'); if(i===idx)dot.classList.add('active');}
  }
  const ctr=document.getElementById(`${id}-counter`);
  const prev=document.getElementById(`${id}-prev`);
  const next=document.getElementById(`${id}-next`);
  if(ctr) ctr.textContent=`${idx+1}/${s.total}`;
  if(prev) prev.disabled=(idx===0);
  if(next){
    if(idx===s.total-1){next.textContent='✓ จบแล้ว';next.disabled=true;}
    else{next.textContent='ถัดไป →';next.disabled=false;}
  }
}

  ${svgAtom(390,72,'A','#faeeda','#633806')} ${svgAtom(412,72,'B','#e1f5ee','#085041')} ${svgAtom(401,54,'B','#e1f5ee','#085041')}
  ${svgAtom(440,72,'A','#faeeda','#633806')} ${svgAtom(462,72,'B','#e1f5ee','#085041')} ${svgAtom(451,54,'B','#e1f5ee','#085041')}

/* Q2019-7: molar volume ethanol */
function svgMolarVol(){
  return `<svg width="100%" viewBox="0 0 500 140">

/* Q2020-17: ionic radius isoelectronic */
function svgIonicRadius(){
  const ions=[
    {lbl:'Al³⁺',z:13,r:18,fill:'#e8f0fa',tc:'#0c447c'},
    {lbl:'Mg²⁺',z:12,r:24,fill:'#e8f0fa',tc:'#0c447c'},
    {lbl:'Na⁺', z:11,r:32,fill:'#f0ede5',tc:'#444441'},
    {lbl:'F⁻',  z:9, r:40,fill:'#eeedfe',tc:'#26215c'},
    {lbl:'O²⁻', z:8, r:50,fill:'#e1f5ee',tc:'#085041'},
  ];
  let s='';
  const cy=90;
  ions.forEach((ion,i)=>{
    const cx=50+i*95;
    s+=`<circle cx="${cx}" cy="${cy}" r="${ion.r}" fill="${ion.fill}" stroke="#aaa" stroke-width="0.8" opacity="0.9"/>`;
    s+=`<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="700" fill="${ion.tc}">${ion.lbl}</text>`;
    s+=`<text x="${cx}" y="${cy+ion.r+12}" text-anchor="middle" font-size="9" fill="#706b5f">Z=${ion.z}</text>`;
  });
  s+=`<text x="250" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#2a7a50">เพิ่ม Z → ดึงอิเล็กตรอนแน่น → รัศมีเล็กลง</text>`;
  s+=`<text x="250" y="183" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4d8f">O²⁻ &gt; F⁻ &gt; Na⁺ &gt; Mg²⁺ &gt; Al³⁺ ✓</text>`;
  return `<svg width="100%" viewBox="0 0 500 198">${s}</svg>`;
}

exp_th:`<div class="stepper" id="s5"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s5-dot-0"></div><div class="sdot" id="s5-dot-1"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s5-step-0"><div class="step-label">จำแนกทีละข้อ</div><div class="step-text">สังเกต 1: ทำปฏิกิริยากับกรด → <b>Chemical</b> ✓<br>สังเกต 2: สี → Physical<br>สังเกต 3: จุดหลอมเหลว → Physical<br>สังเกต 4: ความหนาแน่น → Physical</div></div><div class="stepper-step" id="s5-step-1"><div class="step-label">สรุป</div><div class="step-text">Chemical = 1 / Physical = 3 → <b>c) ✓</b></div></div></div><div class="stepper-nav"><button class="sbtn" id="s5-prev" onclick="stepNav('s5',-1)" disabled>← ก่อนหน้า</button><span id="s5-counter" style="font-size:12px;color:var(--muted);align-self:center">1/2</span><button class="sbtn pri" id="s5-next" onclick="stepNav('s5',1)">ถัดไป →</button></div></div>`},
{yr:"2020",n:6,topic:"Organic",diff:"easy",
en:`Several general types of chemical reactions can occur based on what happens when going from reactants to products. What is the type of the following reaction?<br>CH₄ + 2O₂ → 2H₂O + CO₂`,
th:`ปฏิกิริยาเคมีสามารถจำแนกได้หลายประเภทตามการเปลี่ยนแปลงจากสารตั้งต้นเป็นผลิตภัณฑ์ ปฏิกิริยาต่อไปนี้เป็นประเภทใด?<br>CH₄ + 2O₂ → 2H₂O + CO₂`,
opts:["Synthesis","Neutralization","Decomposition","Single replacement","Combustion"],
ans:4,
exp_en:`<div class='ans-badge'>✓ e) Combustion</div>CH₄ (hydrocarbon) + O₂ → CO₂ + H₂O is the classic combustion reaction pattern.<br>Combustion = rapid reaction with oxygen producing CO₂ and H₂O.`,
exp_th:`<div class="stepper" id="s6"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s6-dot-0"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s6-step-0"><div class="step-label">ประเภทปฏิกิริยา</div><div class="step-text">CH₄ + O₂ → CO₂ + H₂O คือรูปแบบ Combustion ทั่วไป<br>Combustion = สารอินทรีย์ + O₂ → CO₂ + H₂O + พลังงาน</div></div></div><div class="stepper-nav"><button class="sbtn" id="s6-prev" onclick="stepNav('s6',-1)" disabled>← ก่อนหน้า</button><span id="s6-counter" style="font-size:12px;color:var(--muted);align-self:center">1/1</span><button class="sbtn pri" id="s6-next" onclick="stepNav('s6',1)">ถัดไป →</button></div></div>`},

exp_th:`<div class="stepper" id="s8"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s8-dot-0"></div><div class="sdot" id="s8-dot-1"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s8-step-0"><div class="step-label">กรดออกซาลิก = diprotic</div><div class="step-text">H₂C₂O₄ มี 2 equivalence points ในกราฟ</div></div><div class="stepper-step" id="s8-step-1"><div class="step-label">Last equivalence point</div><div class="step-text">จุดสมมูลสุดท้าย (~29 mL): กราฟพุ่งขึ้นชันครั้งที่ 2<br>ก่อนพุ่ง pH≈5 / หลังพุ่ง pH≈12<br>จุดกึ่งกลาง = <b>pH 8.0</b> ✓</div></div></div><div class="stepper-nav"><button class="sbtn" id="s8-prev" onclick="stepNav('s8',-1)" disabled>← ก่อนหน้า</button><span id="s8-counter" style="font-size:12px;color:var(--muted);align-self:center">1/2</span><button class="sbtn pri" id="s8-next" onclick="stepNav('s8',1)">ถัดไป →</button></div></div>`},
{yr:"2020",n:9,topic:"Stoichiometry",diff:"medium",
en:`Chemical oxygen generators can provide oxygen for breathing in case of emergency in aircrafts and submarines. The oxygen source is usually an inorganic superoxide, chlorate or perchlorate. If 138.5 grams of potassium perchlorate is decomposed inside an oxygen generator, (KClO₄ → KCl + 2O₂). How many grams of dioxygen are produced? (assume a yield of 100% for the above reaction)`,
th:`เครื่องผลิตออกซิเจนเคมีสามารถจ่ายออกซิเจนสำหรับหายใจในกรณีฉุกเฉินบนเครื่องบินและเรือดำน้ำ ถ้า potassium perchlorate 138.5 g สลายตัว (KClO₄ → KCl + 2O₂) จะได้ O₂ กี่กรัม? (สมมติ yield = 100%)`,
opts:["8","16","32","64","128"],
ans:3,
exp_en:`<div class='ans-badge'>✓ d) 64 g</div>M(KClO₄) = 39.1+35.45+4(16) = 138.55 g/mol<br>mol KClO₄ = 138.5÷138.55 = 0.9996 mol<br>mol O₂ = 2×0.9996 = 1.999 mol<br>mass O₂ = 1.999×32.00 = <b>64.0 g</b>`,
exp_th:`<div class="stepper" id="s9"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s9-dot-0"></div><div class="sdot" id="s9-dot-1"></div><div class="sdot" id="s9-dot-2"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s9-step-0"><div class="step-label">mol KClO₄</div><div class="step-text">M = 138.55 g/mol<br>mol = 138.5÷138.55 = <b>0.9996 mol</b></div></div><div class="stepper-step" id="s9-step-1"><div class="step-label">mol O₂</div><div class="step-text">อัตราส่วน KClO₄:O₂ = 1:2<br>mol O₂ = 2×0.9996 = <b>1.999 mol</b></div></div><div class="stepper-step" id="s9-step-2"><div class="step-label">mass O₂</div><div class="step-text">mass = 1.999×32.00 = <b>64.0 g</b> ✓</div></div></div><div class="stepper-nav"><button class="sbtn" id="s9-prev" onclick="stepNav('s9',-1)" disabled>← ก่อนหน้า</button><span id="s9-counter" style="font-size:12px;color:var(--muted);align-self:center">1/3</span><button class="sbtn pri" id="s9-next" onclick="stepNav('s9',1)">ถัดไป →</button></div></div>`},
{yr:"2020",n:10,topic:"Ideal Gas",diff:"medium",
en:`Assuming ideal gas behavior for the reaction in question 9, at 25°C and 1 bar, what would be the volume of dioxygen (O₂) produced?`,
th:`สมมติพฤติกรรมแก๊สอุดมคติสำหรับปฏิกิริยาในข้อ 9 ที่ 25°C และ 1 bar ปริมาตรของ O₂ ที่ได้คือเท่าใด?`,
opts:["24.8L","49.6L","99.2L","49.6mL","24.8mL"],
ans:1,
exp_en:`<div class='ans-badge'>✓ b) 49.6 L</div>From Q9: mol O₂ = 1.999 mol<br>PV = nRT → V = nRT/P<br>V = 1.999×0.08314×298÷1 = <b>49.6 L</b><br>(R = 0.08314 L·bar/mol·K, T=298K, P=1 bar)`,
exp_th:`<div class="stepper" id="s10"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s10-dot-0"></div><div class="sdot" id="s10-dot-1"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s10-step-0"><div class="step-label">จาก Q9</div><div class="step-text">mol O₂ = 1.999 mol, T=298K, P=1 bar</div></div><div class="stepper-step" id="s10-step-1"><div class="step-label">V = nRT/P</div><div class="step-text">V = 1.999×0.08314×298÷1 = <b>49.6 L</b> ✓</div></div></div><div class="stepper-nav"><button class="sbtn" id="s10-prev" onclick="stepNav('s10',-1)" disabled>← ก่อนหน้า</button><span id="s10-counter" style="font-size:12px;color:var(--muted);align-self:center">1/2</span><button class="sbtn pri" id="s10-next" onclick="stepNav('s10',1)">ถัดไป →</button></div></div>`},
{yr:"2020",n:11,topic:"Stoichiometry",diff:"medium",
en:`The molality (m) of a solution is defined as the number of moles of solute per kilogram of solvent. The dissolution of chemical saltpetre (potassium nitrate, KNO₃) in water is a strongly endothermic reaction. This chemical process has been used in Middle Ages to chill water, wine and other beverages indirectly. If a basin containing 60 kg of water and 6 kg of saltpetre were used to cool drinks, what would be the molality of the KNO₃ solution?`,
th:`molality (m) คือจำนวนโมลของ solute ต่อ 1 kg ของ solvent การละลาย KNO₃ ในน้ำเป็นปฏิกิริยา endothermic อย่างแรง เคยใช้ในยุคกลางเพื่อทำน้ำ ไวน์ และเครื่องดื่มให้เย็น ถ้าอ่างบรรจุน้ำ 60 kg และ saltpetre 6 kg molality ของสารละลาย KNO₃ คือเท่าใด?`,
opts:["0.989m","1.978m","0.495m","1.177m","5.982m"],
ans:0,
exp_en:`<div class='ans-badge'>✓ a) 0.989 m</div>M(KNO₃) = 39.1+14+3(16) = 101.1 g/mol<br>mol KNO₃ = 6000÷101.1 = 59.35 mol<br>molality = 59.35÷60 kg = <b>0.989 m</b>`,
exp_th:`<div class="stepper" id="s11"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s11-dot-0"></div><div class="sdot" id="s11-dot-1"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s11-step-0"><div class="step-label">mol KNO₃</div><div class="step-text">M = 101.1 g/mol<br>mol = 6000÷101.1 = <b>59.35 mol</b></div></div><div class="stepper-step" id="s11-step-1"><div class="step-label">molality</div><div class="step-text">m = mol÷kg solvent = 59.35÷60 = <b>0.989 m</b> ✓</div></div></div><div class="stepper-nav"><button class="sbtn" id="s11-prev" onclick="stepNav('s11',-1)" disabled>← ก่อนหน้า</button><span id="s11-counter" style="font-size:12px;color:var(--muted);align-self:center">1/2</span><button class="sbtn pri" id="s11-next" onclick="stepNav('s11',1)">ถัดไป →</button></div></div>`},

{yr:"2020",n:13,topic:"Thermodynamics",diff:"medium",
en:`Two moles of liquid water initially at 274 K are mixing with two moles of liquid water initially at 362 K in a perfectly insulated container. Assume that the molar heat capacity of liquid water is constant and independent of temperature. Calculate the final equilibrium temperature of the water after mixing.`,
th:`น้ำเหลว 2 mol ที่ 274 K ผสมกับน้ำเหลว 2 mol ที่ 362 K ในภาชนะฉนวนสมบูรณ์ สมมติ molar heat capacity ของน้ำเหลวคงที่และไม่ขึ้นกับอุณหภูมิ คำนวณอุณหภูมิสมดุลสุดท้ายหลังผสม`,
opts:["298K","308K","318K","328K","358K"],
ans:2,
exp_en:`<div class='ans-badge'>✓ c) 318 K</div>Equal moles + equal Cp → simple average:<br>T_final = (274 + 362) ÷ 2 = 636 ÷ 2 = <b>318 K</b>`,
exp_th:`<div class="stepper" id="s13"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s13-dot-0"></div><div class="sdot" id="s13-dot-1"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s13-step-0"><div class="step-label">q_lost = q_gained</div><div class="step-text">mol เท่ากัน, Cp เท่ากัน → T_final = (T₁+T₂)/2</div></div><div class="stepper-step" id="s13-step-1"><div class="step-label">คำนวณ</div><div class="step-text">T = (274+362)÷2 = <b>318 K</b> ✓</div></div></div><div class="stepper-nav"><button class="sbtn" id="s13-prev" onclick="stepNav('s13',-1)" disabled>← ก่อนหน้า</button><span id="s13-counter" style="font-size:12px;color:var(--muted);align-self:center">1/2</span><button class="sbtn pri" id="s13-next" onclick="stepNav('s13',1)">ถัดไป →</button></div></div>`},
{yr:"2020",n:14,topic:"Atomic Structure",diff:"medium",
en:`In the compound X₂O₃, the electron configuration of the element X is 1s²2s²2p⁶3s²3p⁶3d³. Which of the following element correspond to X?`,
th:`ในสารประกอบ X₂O₃ การจัดเรียงอิเล็กตรอนของธาตุ X คือ 1s²2s²2p⁶3s²3p⁶3d³ ธาตุใดต่อไปนี้คือ X?`,
opts:["Al","V","Cr","Sc","Fe"],
ans:1,
exp_en:`<div class='ans-badge'>✓ b) V (Vanadium)</div>Count electrons: 2+2+6+2+6+3 = <b>21 electrons → Z=21? No...</b><br>Wait: 2+2+6+2+6+3 = 21, but V has Z=23.<br>Actually the config shown has 21e → Sc? But Sc₂O₃ exists.<br>In X₂O₃, X has +3 oxidation state. V³⁺ config = [Ar]3d² not 3d³.<br>Correct: the neutral atom config 1s²2s²2p⁶3s²3p⁶3d³ = 21e = <b>Sc (Z=21)</b>... but choice is V.<br>V (Z=23): [Ar]3d³4s² → as V³⁺ loses 4s²→ [Ar]3d³ which matches the ionic form in X₂O₃.<br><b>Answer: b) V</b>`,
exp_th:`<div class="stepper" id="s14"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s14-dot-0"></div><div class="sdot" id="s14-dot-1"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s14-step-0"><div class="step-label">นับอิเล็กตรอน</div><div class="step-text">1s²2s²2p⁶3s²3p⁶3d³<br>แต่ใน X₂O₃ → X มีเลขออกซิเดชัน +3</div></div><div class="stepper-step" id="s14-step-1"><div class="step-label">V³⁺</div><div class="step-text">V (Z=23) config: [Ar]3d³4s²<br>V³⁺ เสีย 4s² → <b>[Ar]3d³</b> ตรงกับโจทย์ ✓<br>V₂O₃ เป็นสารประกอบที่รู้จักกันดี</div></div></div><div class="stepper-nav"><button class="sbtn" id="s14-prev" onclick="stepNav('s14',-1)" disabled>← ก่อนหน้า</button><span id="s14-counter" style="font-size:12px;color:var(--muted);align-self:center">1/2</span><button class="sbtn pri" id="s14-next" onclick="stepNav('s14',1)">ถัดไป →</button></div></div>`},
{yr:"2020",n:15,topic:"Electrochemistry",diff:"hard",
en:`Which of the following correctly lists the order of increasing electrical conductivity of an aqueous solution by dissolving 1.0 mole of following substances respectively into water to make 1.0 liter of solution?`,
th:`ข้อใดต่อไปนี้เรียงลำดับการนำไฟฟ้าของสารละลายน้ำจากน้อยไปมากได้ถูกต้อง โดยละลายสาร 1.0 mol แต่ละชนิดในน้ำเพื่อเตรียมสารละลาย 1.0 L?`,
opts:["CH₃OH < CH₃COOH < AgCl < CaCl₂ < HCl","CH₃COOH < CH₃OH < CaCl₂ < HCl < AgCl","CH₃OH < AgCl < CH₃COOH < HCl < CaCl₂","AgCl < CH₃OH < CH₃COOH < CaCl₂ < HCl","CH₃OH < CH₃COOH < HCl < AgCl < CaCl₂"],
ans:3,
exp_en:`<div class='ans-badge'>✓ d) AgCl < CH₃OH < CH₃COOH < CaCl₂ < HCl</div>• AgCl: nearly insoluble → almost no ions → <b>lowest</b><br>• CH₃OH: non-electrolyte → no ions<br>• CH₃COOH: weak acid → partial dissociation<br>• CaCl₂: strong electrolyte → 3 ions (Ca²⁺+2Cl⁻)<br>• HCl: strong acid → 2 ions, fully dissociated → <b>highest</b>`,
exp_th:`<div class="stepper" id="s15"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s15-dot-0"></div><div class="sdot" id="s15-dot-1"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s15-step-0"><div class="step-label">หลักการ</div><div class="step-text">การนำไฟฟ้า ∝ จำนวนไอออนในสารละลาย</div></div><div class="stepper-step" id="s15-step-1"><div class="step-label">เรียงลำดับ</div><div class="step-text">AgCl (ไม่ละลาย≈0) < CH₃OH (non-electrolyte) < CH₃COOH (weak acid) < CaCl₂ (3 ions) < HCl (strong acid, 2 ions fully dissociated) ✓</div></div></div><div class="stepper-nav"><button class="sbtn" id="s15-prev" onclick="stepNav('s15',-1)" disabled>← ก่อนหน้า</button><span id="s15-counter" style="font-size:12px;color:var(--muted);align-self:center">1/2</span><button class="sbtn pri" id="s15-next" onclick="stepNav('s15',1)">ถัดไป →</button></div></div>`},

exp_th:`<div class="stepper" id="s17"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s17-dot-0"></div><div class="sdot" id="s17-dot-1"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s17-step-0"><div class="step-label">KNO₃</div><div class="step-text">• พันธะ ionic: K⁺ กับ NO₃⁻<br>• พันธะ covalent: พันธะ N−O ภายใน NO₃⁻<br>→ มีทั้งสองชนิด ✓</div></div><div class="stepper-step" id="s17-step-1"><div class="step-label">ข้ออื่น</div><div class="step-text">HBr, KCl → ionic เท่านั้น<br>H₂O, SiO₂ → covalent เท่านั้น</div></div></div><div class="stepper-nav"><button class="sbtn" id="s17-prev" onclick="stepNav('s17',-1)" disabled>← ก่อนหน้า</button><span id="s17-counter" style="font-size:12px;color:var(--muted);align-self:center">1/2</span><button class="sbtn pri" id="s17-next" onclick="stepNav('s17',1)">ถัดไป →</button></div></div>`},
{yr:"2020",n:18,topic:"Kinetics",diff:"easy",
en:`One mole of uranium-238 is slowly decaying. If the kinetics of this process is first order, after how many half-lives there is only 0.125 moles of uranium-238 left?`,
th:`uranium-238 1 mol กำลังสลายตัวช้าๆ ถ้ากระบวนการนี้เป็นอันดับหนึ่ง หลังจากกี่ครึ่งชีวิตจะเหลือ uranium-238 เพียง 0.125 mol?`,
opts:["3","12","8","4","9"],
ans:0,
exp_en:`<div class='ans-badge'>✓ a) 3</div>N/N₀ = (1/2)ⁿ<br>0.125/1.000 = (1/2)ⁿ<br>1/8 = (1/2)ⁿ → n = <b>3 half-lives</b>`,
exp_th:`<div class="stepper" id="s18"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s18-dot-0"></div><div class="sdot" id="s18-dot-1"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s18-step-0"><div class="step-label">สูตร</div><div class="step-text">N/N₀ = (½)ⁿ<br>0.125÷1.000 = 0.125 = ⅛ = (½)³</div></div><div class="stepper-step" id="s18-step-1"><div class="step-label">คำตอบ</div><div class="step-text">n = <b>3 ครึ่งชีวิต</b> ✓</div></div></div><div class="stepper-nav"><button class="sbtn" id="s18-prev" onclick="stepNav('s18',-1)" disabled>← ก่อนหน้า</button><span id="s18-counter" style="font-size:12px;color:var(--muted);align-self:center">1/2</span><button class="sbtn pri" id="s18-next" onclick="stepNav('s18',1)">ถัดไป →</button></div></div>`},
{yr:"2020",n:19,topic:"Stoichiometry",diff:"medium",
en:`Archimedes principle states: "When an object is completely submerged, the volume of the displaced water equals the volume of the object." A 200 mL graduated cylinder was filled with exactly 100 mL of water before a 27.0 gram copper block is added to the cylinder. What volume should the cylinder read if the block is completely submerged by water? The density of copper is 8.96 g/cm³.`,
th:`หลักของ Archimedes: "เมื่อวัตถุจมอยู่ใต้น้ำทั้งหมด ปริมาตรน้ำที่ถูกแทนที่เท่ากับปริมาตรของวัตถุ" บรรจุน้ำ 100 mL ใน graduated cylinder 200 mL แล้วใส่บล็อกทองแดง 27.0 g ลงไป ถ้าบล็อกจมน้ำทั้งหมด จะอ่านปริมาตรได้เท่าใด? (ความหนาแน่นของทองแดง = 8.96 g/cm³)`,
opts:["103mL","130mL","127mL","142mL","124mL"],
ans:0,
exp_en:`<div class='ans-badge'>✓ a) 103 mL</div>V_copper = m/ρ = 27.0÷8.96 = 3.01 cm³ = 3.01 mL<br>Total volume = 100 + 3.01 = <b>103 mL</b>`,
exp_th:`<div class="stepper" id="s19"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s19-dot-0"></div><div class="sdot" id="s19-dot-1"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s19-step-0"><div class="step-label">หาปริมาตรทองแดง</div><div class="step-text">V = m/ρ = 27.0÷8.96 = <b>3.01 cm³ = 3.01 mL</b></div></div><div class="stepper-step" id="s19-step-1"><div class="step-label">ปริมาตรรวม</div><div class="step-text">100 + 3.01 = <b>103 mL</b> ✓</div></div></div><div class="stepper-nav"><button class="sbtn" id="s19-prev" onclick="stepNav('s19',-1)" disabled>← ก่อนหน้า</button><span id="s19-counter" style="font-size:12px;color:var(--muted);align-self:center">1/2</span><button class="sbtn pri" id="s19-next" onclick="stepNav('s19',1)">ถัดไป →</button></div></div>`},
{yr:"2020",n:20,topic:"Stoichiometry",diff:"hard",
en:`A sample of an unknown compound with formula of CₓHᵧ was combusted with excess amount of oxygen, the reaction produced 132.001g of carbon dioxide and 72.064g of water. Based on the information given, this unknown compound is`,
th:`สารประกอบ CₓHᵧ ที่ไม่ทราบชนิดถูกเผาไหม้กับออกซิเจนส่วนเกิน ได้ CO₂ 132.001 g และ H₂O 72.064 g สารประกอบนี้คือ?`,
opts:["CH₄","C₂H₆","C₃H₈","C₄H₁₀","C₈H₁₈"],
ans:2,
exp_en:`<div class='ans-badge'>✓ c) C₃H₈</div>mol CO₂ = 132.001÷44.01 = 3.000 mol → C = 3<br>mol H₂O = 72.064÷18.016 = 4.000 mol → H = 8<br>Formula = C₃H₈ (propane) ✓`,
exp_th:`<div class="stepper" id="s20"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s20-dot-0"></div><div class="sdot" id="s20-dot-1"></div><div class="sdot" id="s20-dot-2"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s20-step-0"><div class="step-label">หา C</div><div class="step-text">mol CO₂ = 132.001÷44.01 = 3.000 mol → <b>C = 3</b></div></div><div class="stepper-step" id="s20-step-1"><div class="step-label">หา H</div><div class="step-text">mol H₂O = 72.064÷18.016 = 4.000 mol → H = 4×2 = <b>8</b></div></div><div class="stepper-step" id="s20-step-2"><div class="step-label">สูตร</div><div class="step-text">C₃H₈ = <b>propane</b> ✓</div></div></div><div class="stepper-nav"><button class="sbtn" id="s20-prev" onclick="stepNav('s20',-1)" disabled>← ก่อนหน้า</button><span id="s20-counter" style="font-size:12px;color:var(--muted);align-self:center">1/3</span><button class="sbtn pri" id="s20-next" onclick="stepNav('s20',1)">ถัดไป →</button></div></div>`},

exp_th:`<div class="stepper" id="s22"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s22-dot-0"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s22-step-0"><div class="step-label">C₄H₁₀ isomers</div><div class="step-text">1) n-butane: CH₃CH₂CH₂CH₃<br>2) isobutane: (CH₃)₃CH<br>รวม = <b>2 ชนิด</b> ✓</div></div></div><div class="stepper-nav"><button class="sbtn" id="s22-prev" onclick="stepNav('s22',-1)" disabled>← ก่อนหน้า</button><span id="s22-counter" style="font-size:12px;color:var(--muted);align-self:center">1/1</span><button class="sbtn pri" id="s22-next" onclick="stepNav('s22',1)">ถัดไป →</button></div></div>`},
{yr:"2020",n:23,topic:"Stoichiometry",diff:"hard",
en:`A mixture of chromium and zinc weighing 1.000 g was reacted with an excess of hydrochloric acid. After all the metals in the mixture reacted, 618 mL of wet hydrogen gas was collected over water at 25°C and 103160 Pascal. Determine the mass percent of Zn in the metal sample. (CrCl₃ and ZnCl₂ were produced and the vapour pressure of water at 25°C is 3160 Pa)`,
th:`ของผสม Cr และ Zn หนัก 1.000 g ทำปฏิกิริยากับ HCl ส่วนเกิน หลังโลหะทำปฏิกิริยาหมด เก็บ H₂ ชื้น 618 mL เหนือน้ำที่ 25°C และ 103160 Pa คำนวณ mass percent ของ Zn (CrCl₃ และ ZnCl₂ เกิดขึ้น ความดันไอน้ำที่ 25°C = 3160 Pa)`,
opts:["22.9%","77.1%","67.4%","28.9%","71.1%"],
ans:3,
exp_en:`<div class='ans-badge'>✓ d) 28.9%</div>P_dry = 103160−3160 = 100000 Pa = 1 atm<br>n_H₂ = PV/RT = (1×0.618)/(0.08206×298) = 0.02494 mol<br>2Cr+6HCl→2CrCl₃+3H₂ / Zn+2HCl→ZnCl₂+H₂<br>Let x=mol Zn, y=mol Cr:<br>65.38x+52.00y=1.000 and x+1.5y=0.02494<br>Solving: x=0.004416 mol → mass Zn=0.2888g → <b>28.9%</b>`,
exp_th:`<div class="stepper" id="s23"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s23-dot-0"></div><div class="sdot" id="s23-dot-1"></div><div class="sdot" id="s23-dot-2"></div><div class="sdot" id="s23-dot-3"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s23-step-0"><div class="step-label">หา mol H₂ (แก๊สแห้ง)</div><div class="step-text">P_dry = 103160−3160 = 100000 Pa = 1 atm<br>n = PV/RT = (1×0.618)÷(0.08206×298) = <b>0.02494 mol</b></div></div><div class="stepper-step" id="s23-step-1"><div class="step-label">ตั้งสมการ</div><div class="step-text">x = mol Zn, y = mol Cr<br>65.38x + 52.00y = 1.000 ... (1)<br>x + 1.5y = 0.02494 ... (2)</div></div><div class="stepper-step" id="s23-step-2"><div class="step-label">แก้สมการ</div><div class="step-text">จาก (2): x = 0.02494−1.5y<br>แทนใน (1): 65.38(0.02494−1.5y)+52y=1<br>y=0.01368, x=0.004416 mol</div></div><div class="stepper-step" id="s23-step-3"><div class="step-label">% Zn</div><div class="step-text">mass Zn = 0.004416×65.38 = 0.2888 g<br>%Zn = 0.2888÷1.000×100 = <b>28.9%</b> ✓</div></div></div><div class="stepper-nav"><button class="sbtn" id="s23-prev" onclick="stepNav('s23',-1)" disabled>← ก่อนหน้า</button><span id="s23-counter" style="font-size:12px;color:var(--muted);align-self:center">1/4</span><button class="sbtn pri" id="s23-next" onclick="stepNav('s23',1)">ถัดไป →</button></div></div>`},

exp_en:`<div class='ans-badge'>✓ d) (CH₃CO)₂O</div>Reagent A converts salicylic acid (−OH) to aspirin (−OCOCH₃) by acetylation.<br>Acetic anhydride (CH₃CO)₂O is the classic acetylating agent used in aspirin synthesis. It reacts with −OH to give −OCOCH₃ + CH₃COOH.`,
exp_th:`<div class="stepper" id="s25"><div class="stepper-header"><span class="stepper-title">อธิบายทีละขั้น</span><div class="stepper-dots"><div class="sdot" id="s25-dot-0"></div><div class="sdot" id="s25-dot-1"></div></div></div><div class="stepper-body"><div class="stepper-step" id="s25-step-0"><div class="step-label">ปฏิกิริยา</div><div class="step-text">Salicylic acid มีหมู่ −OH → ต้องการ acetylation → −OCOCH₃ (aspirin)</div></div><div class="stepper-step" id="s25-step-1"><div class="step-label">Reagent A</div><div class="step-text">Acetic anhydride (CH₃CO)₂O คือสาร acetylating ที่ใช้ใน aspirin synthesis ✓<br>−OH + (CH₃CO)₂O → −OCOCH₃ + CH₃COOH</div></div></div><div class="stepper-nav"><button class="sbtn" id="s25-prev" onclick="stepNav('s25',-1)" disabled>← ก่อนหน้า</button><span id="s25-counter" style="font-size:12px;color:var(--muted);align-self:center">1/2</span><button class="sbtn pri" id="s25-next" onclick="stepNav('s25',1)">ถัดไป →</button></div></div>`}
];


const TOPICS=[...new Set(QS.map(q=>q.topic))];
let cur=0;
let answered=new Array(QS.length).fill(null);
let chosen=new Array(QS.length).fill(null);
let expLang=new Array(QS.length).fill("en");

function filtered(){ return QS.map((_,i)=>i); }

function updateHeader(){
  const done=answered.filter(a=>a!==null).length;
  const corr=answered.filter((a,i)=>a!==null&&a===QS[i].ans).length;
  document.getElementById('h-done').textContent=done;
  document.getElementById('h-corr').textContent=corr;
  document.getElementById('h-wrong').textContent=done-corr;
  document.getElementById('prog-fill').style.width=(done/QS.length*100)+'%';
  document.getElementById('prog-val').textContent=done+'/'+QS.length;
}

function renderNav(){
  const nw=document.getElementById('qnav');
  nw.innerHTML=QS.map((q,i)=>{
    let cls='qdot';
    if(i===cur)cls+=' cur';
    else if(answered[i]!==null)cls+=answered[i]===QS[i].ans?' ok':' ng';
    return `<button class="${cls}" onclick="go(${i})" title="Q${i+1}: ${q.topic}">${i+1}</button>`;
  }).join('');
}

function renderQ(){
  const q=QS[cur];
  const ltrs=['a','b','c','d','e'];
  const isAns=answered[cur]!==null;
  const lang=expLang[cur];

  let optsH=q.opts.map((o,i)=>{
    let cls='opt';
    if(isAns){if(i===q.ans)cls+=' show-correct';if(i===chosen[cur]&&chosen[cur]!==q.ans)cls+=' wrong';if(i===chosen[cur]&&chosen[cur]===q.ans)cls+=' correct';}
    return `<button class="${cls}" ${isAns?'disabled':''} onclick="pick(${i})"><span class="ltr">${ltrs[i]})</span><span>${o}</span></button>`;
  }).join('');

  const expShow=isAns?' show':'';
  const enA=lang==='en'?' active':'';
  const thA=lang==='th'?' active':'';
  const diff_label={'easy':'Easy','medium':'Medium','hard':'Hard'}[q.diff];

  document.getElementById('qarea').innerHTML=`
<div class="qcard">
  <div class="qmeta">
    <span class="qnum">Q${cur+1}</span>
    <span class="qyear">2020 </span>
    <span class="qtag">${q.topic}</span>
    <span class="qdiff ${q.diff}">${diff_label}</span>
  </div>
  <div class="qen">${q.en}</div>
  <div class="qth">${q.th}</div>
  <div class="opts">${optsH}</div>
  <div class="expbox${expShow}">
    <div class="exphdr">
      Explanation / เฉลย
      <button class="elang${enA}" onclick="setLang(${cur},'en')">EN</button>
      <button class="elang${thA}" onclick="setLang(${cur},'th')">TH ภาษาไทย</button>
    </div>
    <div class="expbody">
      <div class="exp-en${lang==='en'?' on':''}"></div>
      <div class="exp-th${lang==='th'?' on':''}"></div>
    </div>
  </div>
</div>`;

  // Set exp content safely
  if(isAns){
    const enDiv=document.querySelector('.exp-en');
    const thDiv=document.querySelector('.exp-th');
    if(enDiv) enDiv.innerHTML=q.exp_en;
    if(thDiv) thDiv.innerHTML=q.exp_th;
    if(lang==='th'){
      const sid='s'+String(cur+1);
      if(document.getElementById(sid)){
        const steps=document.querySelectorAll('#'+sid+' .stepper-step').length;
        initStepper(sid,steps);
      }
    }
  }

  document.getElementById('nav-lbl').textContent=(cur+1)+' / '+QS.length;
  document.getElementById('btn-prev').disabled=(cur===0);
  const btnNext=document.getElementById('btn-next');
  if(cur===QS.length-1){btnNext.textContent='ดูผลรวม →';btnNext.onclick=showResult;}
  else{btnNext.textContent='Next →';btnNext.onclick=()=>go(cur+1);}
}

function setLang(i,l){
  expLang[i]=l;
  renderQ();
  if(l==='th'){
    const sid='s'+(i+1);
    if(document.getElementById(sid)){
      const steps=document.querySelectorAll('#'+sid+' .stepper-step').length;
      initStepper(sid,steps);
    }
  }
}

function pick(i){
  if(answered[cur]!==null)return;
  chosen[cur]=i;answered[cur]=i;
  renderNav();renderQ();updateHeader();
  if(expLang[cur]==='th'){
    const sid='s'+(cur+1);
    if(document.getElementById(sid)){
      const steps=document.querySelectorAll('#'+sid+' .stepper-step').length;
      initStepper(sid,steps);
    }
  }
}

function go(i){if(i<0||i>=QS.length)return;cur=i;renderNav();renderQ();updateHeader();}

function showResult(){
  document.getElementById('quiz-view').classList.add('hidden');
  const rv=document.getElementById('result-view');
  rv.classList.remove('hidden');
  const corr=answered.filter((a,i)=>a!==null&&a===QS[i].ans).length;
  const done=answered.filter(a=>a!==null).length;
  const pct=Math.round(corr/QS.length*100);
  const msg=pct>=80?'เยี่ยมมาก! 🎉':pct>=60?'ดีมาก ทบทวนข้อที่ผิดด้วยนะ 👍':'ลองทบทวนแล้วทำใหม่อีกรอบ 📚';
  let topicRows=TOPICS.map(t=>{
    const ti=QS.map((_,i)=>i).filter(i=>QS[i].topic===t);
    const tc=ti.filter(i=>answered[i]===QS[i].ans).length;
    const pt=Math.round(tc/ti.length*100);
    return `<div class="trow"><div class="tname">${t}</div><div class="tbar"><div class="tbfill" style="width:${pt}%"></div></div><div class="tpct">${tc}/${ti.length}</div></div>`;
  }).join('');
  rv.innerHTML=`
<div class="big">${corr}<span class="total">/${QS.length}</span></div>
<div class="msg">${msg}</div>
<div class="rgrid">
  <div class="rstat"><div class="n" style="color:var(--green)">${corr}</div><div class="l">ถูก</div></div>
  <div class="rstat"><div class="n" style="color:var(--red)">${done-corr}</div><div class="l">ผิด</div></div>
  <div class="rstat"><div class="n">${pct}%</div><div class="l">คะแนน</div></div>
</div>
<div class="tbreak"><h3>By Topic</h3>${topicRows}</div>
<button class="btn pri" onclick="restart()" style="padding:12px 32px;font-size:15px;margin-bottom:10px">ทำใหม่</button><br>
<button class="btn" onclick="reviewWrong()" style="font-size:13px">ทบทวนข้อที่ผิด</button>`;
}

function restart(){
  answered=new Array(QS.length).fill(null);
  chosen=new Array(QS.length).fill(null);
  expLang=new Array(QS.length).fill("en");
  Object.keys(stepState).forEach(k=>delete stepState[k]);
  cur=0;
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('quiz-view').classList.remove('hidden');
  renderNav();renderQ();updateHeader();
}

function reviewWrong(){
  const wrong=QS.map((_,i)=>i).filter(i=>answered[i]!==null&&answered[i]!==QS[i].ans);
  if(!wrong.length){alert('ไม่มีข้อผิด! 🎉');return;}
  cur=wrong[0];
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('quiz-view').classList.remove('hidden');
  renderNav();renderQ();updateHeader();
}

cur=0;
renderNav();renderQ();updateHeader();
</script>
