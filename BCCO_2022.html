<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BCCO 2022 — JCCO Chemistry Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f4ef;--card:#fff;--card2:#f0ede5;--border:#ddd9cf;
  --text:#1c1b18;--muted:#706b5f;
  --green:#2a7a50;--green-bg:#e6f4ed;
  --red:#b83232;--red-bg:#fceaea;
  --blue:#1a4d8f;--blue-bg:#e8f0fa;
  --amber:#a05c0a;--amber-bg:#fdf2df;
  --gold:#b8860b;--gold-bg:#fdf7e3;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{position:sticky;top:0;z-index:200;background:var(--text);display:flex;align-items:center;justify-content:space-between;padding:12px 24px}
.logo{display:flex;align-items:center;gap:10px}
.logo-badge{background:#e8c840;color:#1c1b18;font-size:11px;font-weight:700;letter-spacing:.08em;padding:3px 8px;border-radius:5px}
.logo-title{color:#fff;font-size:14px;font-weight:500;opacity:.9}
.top-stats{display:flex;gap:16px}
.tstat{text-align:center}
.tstat .n{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}
.tstat .l{font-size:10px;opacity:.55;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.tstat .n.g{color:#5dbb87}.tstat .n.r{color:#e57373}.tstat .n.w{color:#fff}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px 80px}
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.prog-lbl{font-size:13px;color:var(--muted)}.prog-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;margin-left:auto}
.prog-bar{height:5px;background:var(--border);border-radius:3px}
.prog-fill{height:100%;background:linear-gradient(90deg,#2a7a50,#5dbb87);border-radius:3px;transition:width .4s}
.qnav-wrap{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px}
.qdot{width:33px;height:33px;border:1px solid var(--border);border-radius:7px;background:var(--card);font-size:11px;font-family:'DM Mono',monospace;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.qdot:hover{background:var(--card2)}.qdot.cur{background:var(--text);color:#fff;border-color:var(--text)}
.qdot.ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.qdot.ng{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.05);animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.qnum{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.qtag{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--blue-bg);color:var(--blue);font-weight:600}
.qdiff{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.qdiff.easy{background:var(--green-bg);color:var(--green)}.qdiff.medium{background:var(--amber-bg);color:var(--amber)}.qdiff.hard{background:var(--red-bg);color:var(--red)}
.qyear{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--gold-bg);color:var(--gold);font-weight:700}
.qen{font-size:15px;line-height:1.65;color:var(--text);margin-bottom:5px}
.qth{font-size:14px;line-height:1.75;color:var(--muted);margin-bottom:18px;padding-left:12px;border-left:2px solid var(--border)}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 15px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;color:var(--text);background:var(--card);text-align:left;width:100%;transition:all .15s;line-height:1.5;font-family:'Sarabun',sans-serif}
.opt:hover:not(:disabled){background:var(--card2);border-color:#bbb6aa}
.opt .ltr{font-weight:700;font-family:'DM Mono',monospace;font-size:13px;min-width:20px;color:var(--muted);margin-top:1px;flex-shrink:0}
.opt.correct{background:var(--green-bg);border-color:var(--green)}.opt.correct .ltr{color:var(--green)}
.opt.wrong{background:var(--red-bg);border-color:var(--red)}.opt.wrong .ltr{color:var(--red)}
.opt.show-correct{background:var(--green-bg);border-color:var(--green)}.opt.show-correct .ltr{color:var(--green)}
.opt:disabled{cursor:default}
.expbox{margin-top:14px;border:1px solid var(--border);border-radius:8px;overflow:hidden;display:none}
.expbox.show{display:block}
.exphdr{padding:9px 16px;background:var(--card2);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.elang{padding:3px 10px;border-radius:10px;font-size:11px;cursor:pointer;font-weight:600;border:none;background:none;color:var(--muted);font-family:'Sarabun',sans-serif}
.elang.active{background:var(--text);color:#fff}
.expbody{padding:16px;font-size:14px;line-height:1.8;color:var(--text)}
.exp-en,.exp-th{display:none}.exp-en.on,.exp-th.on{display:block}
.ans-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:var(--green-bg);border:1px solid var(--green);color:var(--green);font-weight:700;font-size:13px;margin-bottom:10px}
.step{display:flex;gap:10px;margin:6px 0;align-items:flex-start}
.snum{min-width:22px;height:22px;background:var(--blue);color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px;flex-shrink:0}
code{font-family:'DM Mono',monospace;background:var(--card2);padding:1px 5px;border-radius:4px;font-size:13px}
.img-placeholder{background:var(--amber-bg);border:2px dashed var(--amber);border-radius:8px;padding:16px;margin:12px 0;text-align:center;font-size:13px;color:var(--amber);font-weight:600}
.navrow{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:14px}
.btn{padding:10px 22px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-size:14px;font-family:'Sarabun',sans-serif;color:var(--text);cursor:pointer;transition:all .15s;font-weight:500}
.btn:hover{background:var(--card2)}.btn:disabled{opacity:.35;cursor:default}
.btn.pri{background:var(--text);color:#fff;border-color:var(--text)}.btn.pri:hover{background:#333}
.result{text-align:center;padding:50px 20px}
.result .big{font-size:72px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.result .total{font-size:22px;color:var(--muted);font-family:'DM Mono',monospace}
.result .msg{font-size:17px;margin:14px 0 28px;color:var(--muted)}
.hidden{display:none!important}
sub,sup{font-size:.72em}
table.data-table{border-collapse:collapse;margin:8px 0;font-size:13px}
table.data-table td,table.data-table th{border:1px solid var(--border);padding:5px 12px}
table.data-table th{background:var(--card2);font-weight:600}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <div class="logo-badge">BCCO</div>
    <div class="logo-title">BC Chemistry Olympiad · 2022</div>
  </div>
  <div class="top-stats">
    <div class="tstat"><div class="n w" id="h-done">0</div><div class="l">Done</div></div>
    <div class="tstat"><div class="n g" id="h-corr">0</div><div class="l">Correct</div></div>
    <div class="tstat"><div class="n r" id="h-wrong">0</div><div class="l">Wrong</div></div>
  </div>
</div>
<div class="wrap">
  <div id="quiz-view">
    <div class="prog-card">
      <div class="prog-row"><span class="prog-lbl">Progress</span><span class="prog-val" id="prog-val">0/25</span></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="qnav-wrap" id="qnav"></div>
    <div id="qarea"></div>
    <div class="navrow">
      <button class="btn" id="btn-prev" onclick="go(cur-1)">← Prev</button>
      <span id="nav-lbl" style="font-size:13px;color:var(--muted)"></span>
      <button class="btn pri" id="btn-next">Next →</button>
    </div>
  </div>
  <div id="result-view" class="result hidden"></div>
</div>
<script>
const QS=[
  {
    n:1,year:'2022',topic:'Balancing Equations',diff:'easy',
    en:`Which of the following chemical equations is properly balanced?<br><br>
a) C₆H₁₂O₆ + 12O₂ → 6H₂O + 6CO₂<br>
b) C₆H₈ + 6O₂ → 5CO₂ + 4H₂O<br>
c) C₁₂H₂₂O₁₁ + H₂O → 2C₆H₁₂O₆<br>
d) C₂H₂ + 2O₂ → 2CO₂ + H₂O<br>
e) C₁₂H₂₂O₁₂ + H₂O → 2C₆H₁₂O₆`,
    th:`สมการเคมีใดต่อไปนี้ดุลถูกต้อง?`,
    opts:['a) C₆H₁₂O₆ + 12O₂ → 6H₂O + 6CO₂','b) C₆H₈ + 6O₂ → 5CO₂ + 4H₂O','c) C₁₂H₂₂O₁₁ + H₂O → 2C₆H₁₂O₆','d) C₂H₂ + 2O₂ → 2CO₂ + H₂O','e) C₁₂H₂₂O₁₂ + H₂O → 2C₆H₁₂O₆'],
    ans:'c',
    expEn:`<div class="ans-badge">✓ Answer: c) C₁₂H₂₂O₁₁ + H₂O → 2C₆H₁₂O₆ (hydrolysis of sucrose)</div>
<div class="step"><div class="snum">1</div><div>Check c: Left: C=12✓, H=22+2=24✓, O=11+1=12✓ | Right: 2×C₆H₁₂O₆: C=12✓, H=24✓, O=12✓ → <b>Balanced!</b></div></div>
<div class="step"><div class="snum">2</div><div>Check a: C₆H₁₂O₆ + 12O₂ → 6H₂O + 6CO₂. Left O = 6+24 = 30; Right O = 6+12 = 18 ❌</div></div>
<div class="step"><div class="snum">3</div><div>Check d: C₂H₂ + 2O₂ → 2CO₂ + H₂O. Left H=2; Right H=2✓. Left O=4; Right O=4+1=5 ❌</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: c) การไฮโดรไลซิสของซูโครส</div>
<div class="step"><div class="snum">1</div><div>ตรวจ c: ซ้าย C=12,H=24,O=12 | ขวา 2×C₆H₁₂O₆: C=12,H=24,O=12 → <b>ดุลแล้ว!</b></div></div>
<div class="step"><div class="snum">2</div><div>ตรวจ a: O ซ้าย=30, ขวา=18 ❌ | ตรวจ d: O ซ้าย=4, ขวา=5 ❌</div></div>`
  },
  {
    n:2,year:'2022',topic:'Solution Chemistry / Concentration',diff:'medium',
    en:`High Fructose Corn Syrup (HFCS) is used as a sweetener in soft drinks. The type of HFCS that is most commonly used in Coca-Cola is 55 percent fructose and 45 percent glucose (HFCS-55). The glucose and fructose concentrations in Coca-Cola are 0.270 M and 0.330 M respectively. What is the mass of glucose (C₆H₁₂O₆) and fructose (C₆H₁₂O₆) in a 375 mL can of Coke?`,
    th:`น้ำเชื่อมข้าวโพด HFCS ใช้เป็นสารให้ความหวานในน้ำอัดลม Coca-Cola ใช้ HFCS-55 ซึ่งมีฟรุกโทส 55% และกลูโคส 45% ความเข้มข้นของกลูโคสและฟรุกโทสใน Coke คือ 0.270 M และ 0.330 M ตามลำดับ มวลของกลูโคสและฟรุกโทสในกระป๋อง 375 mL คือเท่าใด?`,
    opts:['a) 20.5 g fructose and 16.8 g glucose','b) 22.3 g fructose and 18.2 g glucose','c) 59.5 g fructose and 48.6 g glucose','d) 33.0 g fructose and 27.0 g glucose','e) 27.5 g fructose and 22.5 g glucose'],
    ans:'b',
    expEn:`<div class="ans-badge">✓ Answer: b) 22.3 g fructose and 18.2 g glucose</div>
<div class="step"><div class="snum">1</div><div>Molar mass C₆H₁₂O₆ = 180.16 g/mol (same for both glucose and fructose)</div></div>
<div class="step"><div class="snum">2</div><div>Fructose: mol = 0.330 × 0.375 = 0.12375 mol → mass = 0.12375 × 180.16 = <b>22.3 g</b></div></div>
<div class="step"><div class="snum">3</div><div>Glucose: mol = 0.270 × 0.375 = 0.10125 mol → mass = 0.10125 × 180.16 = <b>18.2 g</b> ✓</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: b)</div>
<div class="step"><div class="snum">1</div><div>มวลโมลาร์ C₆H₁₂O₆ = 180.16 g/mol</div></div>
<div class="step"><div class="snum">2</div><div>ฟรุกโทส: 0.330 × 0.375 × 180.16 = <b>22.3 g</b></div></div>
<div class="step"><div class="snum">3</div><div>กลูโคส: 0.270 × 0.375 × 180.16 = <b>18.2 g</b> ✓</div></div>`
  },
  {
    n:3,year:'2022',topic:'Stoichiometry / Molar Volume',diff:'easy',
    en:`The density of sodium chloride at 25 °C is 2.17 g/cm³. What is the volume of 1 mole of NaCl at 25 °C?`,
    th:`ความหนาแน่นของโซเดียมคลอไรด์ที่ 25°C คือ 2.17 g/cm³ ปริมาตรของ NaCl 1 โมลที่ 25°C คือเท่าใด?`,
    opts:['a) 26.9 cm³','b) 18.0 cm³','c) 126.8 cm³','d) 29.6 cm³','e) 58.4 cm³'],
    ans:'a',
    expEn:`<div class="ans-badge">✓ Answer: a) 26.9 cm³</div>
<div class="step"><div class="snum">1</div><div>Molar mass NaCl: Na(22.99) + Cl(35.45) = 58.44 g/mol</div></div>
<div class="step"><div class="snum">2</div><div>Volume = mass/density = 58.44 g ÷ 2.17 g/cm³ = <b>26.9 cm³</b> ✓</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: a) 26.9 cm³</div>
<div class="step"><div class="snum">1</div><div>มวลโมลาร์ NaCl = 58.44 g/mol</div></div>
<div class="step"><div class="snum">2</div><div>ปริมาตร = 58.44 ÷ 2.17 = <b>26.9 cm³</b> ✓</div></div>`
  },
  {
    n:4,year:'2022',topic:'Stoichiometry / Moles',diff:'easy',
    en:`The New Afton mine in British Columbia is found to contain 0.68 grams of gold per ton of ore. If 45.7 tons of ore is collected from the New Afton mine, how many moles of gold can be extracted from the ore?`,
    th:`เหมือง New Afton ในบริติชโคลัมเบียมีทองคำ 0.68 g ต่อตันแร่ ถ้าขุดแร่ได้ 45.7 ตัน จะสกัดทองคำได้กี่โมล?`,
    opts:['a) 0.015 mol','b) 1.00 mol','c) 0.158 mol','d) 6.12 mol','e) 0.232 mol'],
    ans:'c',
    expEn:`<div class="ans-badge">✓ Answer: c) 0.158 mol</div>
<div class="step"><div class="snum">1</div><div>Mass of Au = 0.68 g/ton × 45.7 ton = 31.08 g</div></div>
<div class="step"><div class="snum">2</div><div>Molar mass Au = 196.97 g/mol</div></div>
<div class="step"><div class="snum">3</div><div>Moles Au = 31.08 ÷ 196.97 = <b>0.158 mol</b> ✓</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: c) 0.158 mol</div>
<div class="step"><div class="snum">1</div><div>มวลทองคำ = 0.68 × 45.7 = 31.08 g</div></div>
<div class="step"><div class="snum">2</div><div>mol Au = 31.08 ÷ 196.97 = <b>0.158 mol</b> ✓</div></div>`
  },
  {
    n:5,year:'2022',topic:'Reaction Types',diff:'easy',
    en:`Several general types of chemical reactions can occur based on what happens when going from reactants to products. What is the type of the following reaction?<br><br><b>CaCO₃ → CaO + CO₂</b>`,
    th:`ปฏิกิริยาต่อไปนี้เป็นประเภทใด?<br><br><b>CaCO₃ → CaO + CO₂</b>`,
    opts:['a) Synthesis','b) Single replacement','c) Decomposition','d) Neutralization','e) Combustion'],
    ans:'c',
    expEn:`<div class="ans-badge">✓ Answer: c) Decomposition</div>
<div class="step"><div class="snum">1</div><div>One compound (CaCO₃) breaks down into two simpler substances (CaO + CO₂)</div></div>
<div class="step"><div class="snum">2</div><div>This is the definition of <b>decomposition</b>: AB → A + B</div></div>
<div class="step"><div class="snum">3</div><div>This reaction occurs when limestone (CaCO₃) is heated — thermal decomposition</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: c) Decomposition (การสลายตัว)</div>
<div class="step"><div class="snum">1</div><div>สารประกอบหนึ่ง (CaCO₃) แตกตัวเป็นสารที่ง่ายกว่า (CaO + CO₂)</div></div>
<div class="step"><div class="snum">2</div><div>นิยาม Decomposition: AB → A + B ✓</div></div>
<div class="step"><div class="snum">3</div><div>เกิดเมื่อหินปูน CaCO₃ ถูกให้ความร้อน (thermal decomposition)</div></div>`
  },
  {
    n:6,year:'2022',topic:'Solution Chemistry',diff:'medium',
    en:`The cause of anemia, a low level of red blood cells, is often iron deficiency. Pharmaceutical-grade ferric citrate can be prepared by the reaction of a ferric salt with citric acid. What is the iron concentration of a solution prepared with 1.30 g of iron chloride hexahydrate (FeCl₃·6H₂O) in a 100 mL volumetric flask?`,
    th:`โรคโลหิตจาง (anemia) มักเกิดจากการขาดธาตุเหล็ก ferric citrate ระดับยาเตรียมจากการทำปฏิกิริยาเกลือเฟอร์ริกกับกรดซิตริก ความเข้มข้นของเหล็กในสารละลายที่เตรียมจาก FeCl₃·6H₂O 1.30 g ในฟลาสก์ 100 mL คือเท่าใด?`,
    opts:['a) 4.81×10⁻¹ M','b) 8.01×10⁻¹ M','c) 4.81×10⁻³ M','d) 8.01×10⁻² M','e) 4.81×10⁻² M'],
    ans:'e',
    expEn:`<div class="ans-badge">✓ Answer: e) 4.81×10⁻² M</div>
<div class="step"><div class="snum">1</div><div>Molar mass FeCl₃·6H₂O: Fe(55.85)+3×Cl(35.45)+6×H₂O(18.02) = 55.85+106.35+108.12 = 270.32 g/mol</div></div>
<div class="step"><div class="snum">2</div><div>Moles FeCl₃·6H₂O = 1.30 ÷ 270.32 = 4.809×10⁻³ mol</div></div>
<div class="step"><div class="snum">3</div><div>Each mole gives 1 mol Fe³⁺. Concentration = 4.809×10⁻³ mol ÷ 0.100 L = <b>4.81×10⁻² M</b> ✓</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: e) 4.81×10⁻² M</div>
<div class="step"><div class="snum">1</div><div>มวลโมลาร์ FeCl₃·6H₂O = 270.32 g/mol</div></div>
<div class="step"><div class="snum">2</div><div>mol = 1.30 ÷ 270.32 = 4.809×10⁻³ mol</div></div>
<div class="step"><div class="snum">3</div><div>ความเข้มข้น = 4.809×10⁻³ ÷ 0.100 = <b>4.81×10⁻² M</b> ✓</div></div>`
  },
  {
    n:7,year:'2022',topic:'Stoichiometry / Combustion',diff:'medium',
    en:`Nitrocellulose (also called guncotton) is a highly flammable compound that can be made by exposing cotton to a mixture of sulfuric and nitric acid. Guncotton can detonate if it is confined, as it would be in the barrel of a gun. The detonation reaction involving nitrocellulose is schematized below:<br><br><b>2C₆H₇N₃O₁₁ → 9CO + 3CO₂ + 7H₂O + 3N₂</b><br><br>If 100 g of guncotton is detonating, how many grams of water is produced?`,
    th:`ไนโตรเซลลูโลส (guncotton) เป็นสารไวไฟที่ทำจากฝ้ายสัมผัสกรดกำมะถันและกรดไนตริก ระเบิดได้เมื่อถูกกักไว้ สมการการระเบิด:<br><br><b>2C₆H₇N₃O₁₁ → 9CO + 3CO₂ + 7H₂O + 3N₂</b><br><br>ถ้าไนโตรเซลลูโลส 100 g ระเบิด จะได้น้ำกี่กรัม?`,
    opts:['a) 21.2 g','b) 6.06 g','c) 42.4 g','d) 350 g','e) 63.1 g'],
    ans:'a',
    expEn:`<div class="ans-badge">✓ Answer: a) 21.2 g</div>
<div class="step"><div class="snum">1</div><div>Molar mass C₆H₇N₃O₁₁: 6(12.01)+7(1.008)+3(14.01)+11(16.00) = 72.06+7.056+42.03+176.0 = 297.15 g/mol</div></div>
<div class="step"><div class="snum">2</div><div>Moles of nitrocellulose = 100 ÷ 297.15 = 0.3365 mol</div></div>
<div class="step"><div class="snum">3</div><div>From equation: 2 mol nitrocellulose → 7 mol H₂O. Moles H₂O = 0.3365 × (7/2) = 1.178 mol</div></div>
<div class="step"><div class="snum">4</div><div>Mass H₂O = 1.178 × 18.02 = <b>21.2 g</b> ✓</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: a) 21.2 g</div>
<div class="step"><div class="snum">1</div><div>มวลโมลาร์ C₆H₇N₃O₁₁ = 297.15 g/mol</div></div>
<div class="step"><div class="snum">2</div><div>mol ไนโตรเซลลูโลส = 100 ÷ 297.15 = 0.3365 mol</div></div>
<div class="step"><div class="snum">3</div><div>2 mol → 7 mol H₂O → mol H₂O = 0.3365 × 3.5 = 1.178 mol</div></div>
<div class="step"><div class="snum">4</div><div>มวล H₂O = 1.178 × 18.02 = <b>21.2 g</b> ✓</div></div>`
  },

    en:`A 50.0 mL canister of Freon-12 (CF₂Cl₂) was heated in boiling water (100.0 °C) until the canister burst. If the canister was not defective, and had a burst rating of 102.3 atm, what minimum amount of Freon-12 was in the canister? (assume ideal gas behavior)`,
    th:`กระป๋อง Freon-12 (CF₂Cl₂) ขนาด 50.0 mL ถูกให้ความร้อนในน้ำเดือด (100.0°C) จนกระป๋องแตก กระป๋องมีค่าความดันแตกที่ 102.3 atm ปริมาณ Freon-12 ขั้นต่ำในกระป๋องคือเท่าใด? (สมมติพฤติกรรมก๊าซอุดมคติ)`,

<div class="step"><div class="snum">3</div><div>ก๊าซ → ของแข็ง โดยตรง (ไม่ผ่านของเหลว) = <b>Deposition</b> ✓</div></div>`

  {
    n:13,year:'2022',topic:"Atomic Structure / Slater's Rule",diff:'hard',
    en:`Effective nuclear charge (Z<sub>eff</sub>) is a useful tool for understanding periodicity. Z<sub>eff</sub> is the net positive charge experienced by an electron in a polyelectronic atom. A good estimate of Z<sub>eff</sub> can be obtained using Slater's rule: Z<sub>eff</sub> = Z – S. In the second row, the screening value is 0.85 for a core electron and 0.35 for a valence electron. Use Slater's rule to estimate the effective nuclear charge for a valence electron in nitrogen (N).`,
    th:`ประจุนิวเคลียร์ที่มีประสิทธิผล (Z<sub>eff</sub>) มีประโยชน์ในการทำความเข้าใจสมบัติตามคาบ Z<sub>eff</sub> คือประจุบวกสุทธิที่อิเล็กตรอนสัมผัสในอะตอมหลายอิเล็กตรอน ประมาณด้วยกฎ Slater: Z<sub>eff</sub> = Z – S โดย S คือค่าคงที่การบัง ในแถวที่สอง: อิเล็กตรอนแกน = 0.85, อิเล็กตรอนวาเลนซ์ = 0.35 ใช้กฎ Slater คำนวณ Z<sub>eff</sub> ของอิเล็กตรอนวาเลนซ์ใน N`,
    opts:['a) 3.80','b) 5.60','c) 3.55','d) 3.90','e) 5.25'],
    ans:'d',
    expEn:`<div class="ans-badge">✓ Answer: d) 3.90</div>
<div class="step"><div class="snum">1</div><div>N: Z=7. Electron configuration: 1s²2s²2p³</div></div>
<div class="step"><div class="snum">2</div><div>Core electrons (1s²): 2 × 0.85 = 1.70</div></div>
<div class="step"><div class="snum">3</div><div>Other valence electrons (2s²2p², 4 electrons excluding one): 4 × 0.35 = 1.40</div></div>
<div class="step"><div class="snum">4</div><div>S = 1.70 + 1.40 = 3.10 → Z<sub>eff</sub> = 7 − 3.10 = <b>3.90</b> ✓</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: d) 3.90</div>
<div class="step"><div class="snum">1</div><div>N: Z=7 การจัดเรียง: 1s²2s²2p³</div></div>
<div class="step"><div class="snum">2</div><div>อิเล็กตรอนแกน (1s²): 2 × 0.85 = 1.70</div></div>
<div class="step"><div class="snum">3</div><div>วาเลนซ์อื่น (4 ตัว): 4 × 0.35 = 1.40</div></div>
<div class="step"><div class="snum">4</div><div>S = 3.10 → Z<sub>eff</sub> = 7 − 3.10 = <b>3.90</b> ✓</div></div>`
  },

    th:`โครงสร้างลิวอิสใดต่อไปนี้ใช้ได้สำหรับคาร์บอเนต (CO₃²⁻)?`,
    opts:['a) Structure 1 only','b) Structure 2 only','c) Structure 3 only','d) All the structures shown','e) None of the structures shown'],
    ans:'d',
    expEn:`<div class="ans-badge">✓ Answer: d) All the structures shown</div>
<div class="step"><div class="snum">1</div><div>CO₃²⁻ has 3 equivalent resonance structures. In each, carbon makes one double bond with one oxygen and single bonds with the other two</div></div>
<div class="step"><div class="snum">2</div><div>Total valence electrons: C(4) + 3×O(6) + 2(charge) = 4+18+2 = 24 electrons</div></div>
<div class="step"><div class="snum">3</div><div>All 3 structures shown are valid resonance contributors. The real carbonate ion is a hybrid of all three, with bond order = 4/3 for each C–O bond</div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: d) ทุกโครงสร้างใช้ได้</div>
<div class="step"><div class="snum">1</div><div>CO₃²⁻ มีโครงสร้าง resonance 3 แบบที่เทียบเท่ากัน แต่ละแบบ C สร้างพันธะคู่กับ O หนึ่งอะตอม และพันธะเดี่ยวกับอีกสอง</div></div>
<div class="step"><div class="snum">2</div><div>โครงสร้างทั้งหมดเป็น resonance contributor ที่ถูกต้อง → ทุกอันใช้ได้ ✓</div></div>`
  },
  {
    n:16,year:'2022',topic:'Atomic Radii',diff:'medium',
    en:`Which of the following atoms or ions has the smallest radius?`,
    th:`อะตอมหรือไอออนใดต่อไปนี้มีรัศมีเล็กที่สุด?`,
    opts:['a) Xe','b) Fr⁺','c) Cs⁺','d) Rn','e) I⁻'],
    ans:'c',
    expEn:`<div class="ans-badge">✓ Answer: c) Cs⁺</div>
<div class="step"><div class="snum">1</div><div>Radii generally increase down a group and decrease right across a period. Cations are smaller than neutral atoms; anions are larger</div></div>
<div class="step"><div class="snum">2</div><div>Cs (Z=55): Period 6, Group 1. Cs⁺ loses 1e → has 54 electrons, same as Xe but with Z=55 (higher nuclear charge) → <b>smaller than Xe</b></div></div>
<div class="step"><div class="snum">3</div><div>Fr⁺: Z=87, loses 1e → 86e (same as Rn), but Z=87 so smaller than Rn. Compare Cs⁺ (54e, Z=55) vs Fr⁺ (86e, Z=87): Cs⁺ has fewer electrons → <b>Cs⁺ is smallest</b></div></div>`,
    expTh:`<div class="ans-badge">✓ คำตอบ: c) Cs⁺</div>
<div class="step"><div class="snum">1</div><div>แคตไอออนมีรัศมีเล็กกว่าอะตอมกลาง</div></div>
<div class="step"><div class="snum">2</div><div>Cs⁺: Z=55 เสีย 1e เหลือ 54e (เหมือน Xe แต่ Z สูงกว่า) → รัศมีเล็กกว่า Xe</div></div>
<div class="step"><div class="snum">3</div><div>เปรียบ Cs⁺ (54e) กับ Fr⁺ (86e): Cs⁺ มีอิเล็กตรอนน้อยกว่า → <b>Cs⁺ รัศมีเล็กที่สุด</b> ✓</div></div>`
  },

    expEn:`<div class="ans-badge">✓ Answer: e) Amine, Ether, Alcohol, Ester, Nitrile</div>
<div class="step"><div class="snum">1</div><div>This drug is <b>Remdesivir</b> (GS-5734), an adenosine nucleotide analogue prodrug. Let's identify all functional groups:</div></div>
<div class="step"><div class="snum">2</div><div><b>Amine (–NH₂)</b>: The primary amine on the adenine-like purine base (H₂N– attached to the ring). Also the –NH– in the phosphoramidate linkage (P–NH– connecting phosphorus to the alanine ester side chain).</div></div>
<div class="step"><div class="snum">3</div><div><b>Ether (–C–O–C–)</b>: The ring oxygen in the ribose sugar (furanose ring) is an ether. The P–O–C linkages also behave as ethers.</div></div>
<div class="step"><div class="snum">4</div><div><b>Alcohol (–OH)</b>: Two free –OH groups on the ribose sugar (at C2' and C3' positions — the two HO– groups shown on the sugar ring).</div></div>
<div class="step"><div class="snum">5</div><div><b>Ester (–COO–)</b>: The 2-ethylbutyl ester group (–COO–CH₂–CH(Et)₂) on the alanine side chain of the phosphoramidate.</div></div>
<div class="step"><div class="snum">6</div><div><b>Nitrile (–C≡N)</b>: The –C≡N group attached at the C1' position of the ribose (shown as the "C" with the triple bond to N in the structure).</div></div>
<div class="step"><div class="snum">7</div><div><b>Why not the other choices?</b><br>a) Alkene — NO C=C double bond present in Remdesivir<br>b) Amide/Ketone — no ketone; the –P(O)–NH– is a phosphoramidate, not a typical amide (C=O–NH)<br>c) Nitro — NO –NO₂ group; alcohol is present but nitro is not<br>d) Cyanide vs Nitrile: –C≡N in organic molecules = nitrile, not ionic cyanide; no benzene ring (it's a purine, not benzene)</div></div>`,

<div class="step"><div class="snum">3</div><div><b>Ether (–C–O–C–)</b>: oxygen วงแหวน ribose (furanose ring) และ P–O–C linkage</div></div>
<div class="step"><div class="snum">4</div><div><b>Alcohol (–OH)</b>: สอง –OH groups บน ribose ตำแหน่ง C2' และ C3'</div></div>

/* ── Quiz Engine (identical to 2021) ── */
let cur=0,answers={};
function updateStats(){
  const done=Object.keys(answers).filter(k=>!k.includes('_')).length;
  const corr=Object.values(answers).filter(v=>v===true).length;
  document.getElementById('h-done').textContent=done;
  document.getElementById('h-corr').textContent=corr;
  document.getElementById('h-wrong').textContent=done-corr;
  const pct=Math.round(done/QS.length*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-val').textContent=done+'/'+QS.length;
}
function buildNav(){
  const nav=document.getElementById('qnav');nav.innerHTML='';
  QS.forEach((q,i)=>{
    const d=document.createElement('button');
    d.className='qdot'+(i===cur?' cur':'')+(answers[q.n]===true?' ok':answers[q.n]===false?' ng':'');
    d.textContent=q.n;d.onclick=()=>go(i);nav.appendChild(d);
  });
}
function langClass(id,lang){
  const eb=document.getElementById(id);if(!eb)return;
  eb.querySelectorAll('.exp-en,.exp-th').forEach(e=>e.classList.remove('on'));
  eb.querySelector('.exp-'+lang)?.classList.add('on');
  eb.querySelectorAll('.elang').forEach(b=>{b.classList.remove('active');if(b.dataset.lang===lang)b.classList.add('active');});
}
function renderQ(idx){
  const q=QS[idx];const qa=document.getElementById('qarea');
  const answered=answers[q.n]!==undefined;
  const diffClass=q.diff==='easy'?'easy':q.diff==='medium'?'medium':'hard';
  let optsHtml=q.opts.map((o,i)=>{
    const ltr=['a','b','c','d','e'][i];
    let cls='opt';
    if(answered){if(ltr===q.ans)cls+=' show-correct';else if(ltr===answers[q.n+'_chosen'])cls+=' wrong';}
    return `<button class="${cls}" ${answered?'disabled':''} onclick="choose('${q.n}','${ltr}','${q.ans}',this)">
      <span class="ltr">${ltr}</span><span>${o.replace(/^[a-e]\)\s*/,'')}</span></button>`;
  }).join('');
  qa.innerHTML=`<div class="qcard">
    <div class="qmeta"><span class="qnum">Q${q.n}</span><span class="qyear">${q.year}</span><span class="qtag">${q.topic}</span><span class="qdiff ${diffClass}">${q.diff}</span></div>
    <div class="qen">${q.en}</div>
    <div class="qth">${q.th}</div>
    <div class="opts">${optsHtml}</div>
    ${answered?`<div class="expbox show" id="exp-${q.n}">
      <div class="exphdr">📘 Explanation
        <button class="elang active" data-lang="en" onclick="langClass('exp-${q.n}','en')">EN</button>
        <button class="elang" data-lang="th" onclick="langClass('exp-${q.n}','th')">TH</button>
      </div>
      <div class="expbody"><div class="exp-en on">${q.expEn}</div><div class="exp-th">${q.expTh}</div></div>
    </div>`:''}
  </div>`;
  document.getElementById('nav-lbl').textContent=(idx+1)+' / '+QS.length;
  document.getElementById('btn-prev').disabled=(idx===0);
  const nb=document.getElementById('btn-next');
  if(idx===QS.length-1){nb.textContent='Finish ✓';nb.onclick=showResult;}
  else{nb.textContent='Next →';nb.onclick=()=>go(cur+1);}
}
function choose(qn,chosen,correct,btn){
  answers[qn]=(chosen===correct);answers[qn+'_chosen']=chosen;
  updateStats();buildNav();renderQ(cur);
}
function go(idx){if(idx<0||idx>=QS.length)return;cur=idx;buildNav();renderQ(cur);}
function showResult(){
  document.getElementById('quiz-view').classList.add('hidden');
  const rv=document.getElementById('result-view');rv.classList.remove('hidden');
  const corr=Object.values(answers).filter(v=>v===true).length;
  const tot=QS.length;const pct=Math.round(corr/tot*100);
  rv.innerHTML=`<div class="big" style="color:${pct>=70?'var(--green)':pct>=50?'var(--amber)':'var(--red)'}">${pct}%</div>
  <div class="total">${corr} / ${tot}</div>
  <div class="msg">${pct>=80?'ยอดเยี่ยมมาก! 🏆':pct>=60?'ดีมาก! 💪':'ฝึกซ้อมเพิ่มเติม 📚'}</div>
  <button class="btn pri" onclick="location.reload()">ลองอีกครั้ง</button>`;
}
buildNav();renderQ(0);updateStats();
</script>
