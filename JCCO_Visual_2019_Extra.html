<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JCCO Visual Past Papers — 2019 & 2020</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f4ef;--card:#fff;--card2:#f0ede5;--border:#ddd9cf;
  --text:#1c1b18;--muted:#706b5f;
  --green:#2a7a50;--green-bg:#e6f4ed;
  --red:#b83232;--red-bg:#fceaea;
  --blue:#1a4d8f;--blue-bg:#e8f0fa;
  --amber:#a05c0a;--amber-bg:#fdf2df;
  --gold:#b8860b;--gold-bg:#fdf7e3;
  --teal:#0f6e56;--teal-bg:#e1f5ee;
  --purple:#534ab7;--purple-bg:#eeedfe;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{position:sticky;top:0;z-index:200;background:var(--text);display:flex;align-items:center;justify-content:space-between;padding:12px 24px}
.logo{display:flex;align-items:center;gap:10px}
.logo-badge{background:#e8c840;color:#1c1b18;font-size:11px;font-weight:700;letter-spacing:.08em;padding:3px 8px;border-radius:5px}
.logo-title{color:#fff;font-size:14px;font-weight:500;opacity:.9}
.top-stats{display:flex;gap:16px}
.tstat{text-align:center}
.tstat .n{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}
.tstat .l{font-size:10px;opacity:.55;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.tstat .n.g{color:#5dbb87}.tstat .n.r{color:#e57373}.tstat .n.w{color:#fff}
.year-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:49px;z-index:150}
.ytab{padding:12px 24px;font-size:14px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Sarabun',sans-serif}
.ytab:hover{color:var(--text)}.ytab.active{color:var(--text);border-bottom-color:var(--text)}
.ytab .badge{display:inline-block;margin-left:6px;background:var(--card2);color:var(--muted);font-size:10px;padding:1px 6px;border-radius:10px;font-family:'DM Mono',monospace}
.ytab.active .badge{background:var(--text);color:#fff}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px 80px}
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.prog-lbl{font-size:13px;color:var(--muted)}.prog-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;margin-left:auto}
.prog-bar{height:5px;background:var(--border);border-radius:3px}
.prog-fill{height:100%;background:linear-gradient(90deg,#2a7a50,#5dbb87);border-radius:3px;transition:width .4s}
.qnav-wrap{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px}
.qdot{width:33px;height:33px;border:1px solid var(--border);border-radius:7px;background:var(--card);font-size:11px;font-family:'DM Mono',monospace;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.qdot:hover{background:var(--card2)}.qdot.cur{background:var(--text);color:#fff;border-color:var(--text)}
.qdot.ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.qdot.ng{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.05);animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.qnum{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.qtag{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--blue-bg);color:var(--blue);font-weight:600}
.qdiff{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.qdiff.easy{background:var(--green-bg);color:var(--green)}.qdiff.medium{background:var(--amber-bg);color:var(--amber)}.qdiff.hard{background:var(--red-bg);color:var(--red)}
.qyear{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--gold-bg);color:var(--gold);font-weight:700}
.qen{font-size:15px;line-height:1.65;color:var(--text);margin-bottom:5px}
.qth{font-size:14px;line-height:1.75;color:var(--muted);margin-bottom:18px;padding-left:12px;border-left:2px solid var(--border)}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 15px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;color:var(--text);background:var(--card);text-align:left;width:100%;transition:all .15s;line-height:1.5;font-family:'Sarabun',sans-serif}
.opt:hover:not(:disabled){background:var(--card2);border-color:#bbb6aa}
.opt .ltr{font-weight:700;font-family:'DM Mono',monospace;font-size:13px;min-width:20px;color:var(--muted);margin-top:1px;flex-shrink:0}
.opt.correct{background:var(--green-bg);border-color:var(--green)}.opt.correct .ltr{color:var(--green)}
.opt.wrong{background:var(--red-bg);border-color:var(--red)}.opt.wrong .ltr{color:var(--red)}
.opt.show-correct{background:var(--green-bg);border-color:var(--green)}.opt.show-correct .ltr{color:var(--green)}
.opt:disabled{cursor:default}
.expbox{margin-top:14px;border:1px solid var(--border);border-radius:8px;overflow:hidden;display:none}
.expbox.show{display:block}
.exphdr{padding:9px 16px;background:var(--card2);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.elang{padding:3px 10px;border-radius:10px;font-size:11px;cursor:pointer;font-weight:600;border:none;background:none;color:var(--muted);font-family:'Sarabun',sans-serif}
.elang.active{background:var(--text);color:#fff}
.expbody{padding:16px;font-size:14px;line-height:1.8;color:var(--text)}
.exp-en,.exp-th{display:none}.exp-en.on,.exp-th.on{display:block}
.ans-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:var(--green-bg);border:1px solid var(--green);color:var(--green);font-weight:700;font-size:13px;margin-bottom:10px}
.step{display:flex;gap:10px;margin:6px 0;align-items:flex-start}
.snum{min-width:22px;height:22px;background:var(--blue);color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px;flex-shrink:0}
code{font-family:'DM Mono',monospace;background:var(--card2);padding:1px 5px;border-radius:4px;font-size:13px}

/* ── interactive stepper (เฉลยทีละขั้น) ── */
.stepper{margin:14px 0 0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.stepper-header{background:var(--card2);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.stepper-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.stepper-dots{display:flex;gap:6px}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s}
.sdot.active{background:var(--blue)}.sdot.done{background:var(--green)}
.stepper-body{padding:16px}
.stepper-step{display:none}.stepper-step.on{display:block;animation:fadein .2s}
.step-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);margin-bottom:8px}
.step-text{font-size:14px;line-height:1.75;margin-bottom:10px}
.stepper-nav{display:flex;gap:8px;justify-content:flex-end;padding:8px 16px;background:var(--card2);border-top:1px solid var(--border)}
.sbtn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:var(--card);font-size:13px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:500;color:var(--text)}
.sbtn:hover{background:var(--card2)}.sbtn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}.sbtn.pri:hover{background:#133d72}
.sbtn:disabled{opacity:.35;cursor:default}

/* svg diagram in stepper */
.svg-wrap{background:var(--card2);border-radius:8px;padding:12px;margin:10px 0;overflow-x:auto}
.svg-wrap svg{display:block;max-width:100%}

/* Nav buttons */
.navrow{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:14px}
.btn{padding:10px 22px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-size:14px;font-family:'Sarabun',sans-serif;color:var(--text);cursor:pointer;transition:all .15s;font-weight:500}
.btn:hover{background:var(--card2)}.btn:disabled{opacity:.35;cursor:default}
.btn.pri{background:var(--text);color:#fff;border-color:var(--text)}.btn.pri:hover{background:#333}

/* Result */
.result{text-align:center;padding:50px 20px}
.result .big{font-size:72px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.result .total{font-size:22px;color:var(--muted);font-family:'DM Mono',monospace}
.result .msg{font-size:17px;margin:14px 0 28px;color:var(--muted)}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:380px;margin:0 auto 28px}
.rstat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.rstat .n{font-size:26px;font-weight:700;font-family:'DM Mono',monospace}.rstat .l{font-size:11px;color:var(--muted);margin-top:2px}
.tbreak{max-width:480px;margin:0 auto 28px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;text-align:left}
.tbreak h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:12px}
.trow{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px}
.tname{min-width:140px}.tbar{flex:1;height:5px;background:var(--border);border-radius:3px}
.tbfill{height:100%;border-radius:3px;background:var(--green)}.tpct{min-width:38px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.hidden{display:none!important}
sub,sup{font-size:.72em}
</style>
</head>
<body>
  <!-- ── password gate: วางบรรทัดนี้เป็นบรรทัดแรกสุด ต่อจาก <body> ในทุกไฟล์ ── -->
<div id="gate-overlay" style="position:fixed;inset:0;z-index:9999;background:#0d1117;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:sans-serif;color:#e6edf3;padding:20px;text-align:center;">
  <p style="margin-bottom:14px;font-size:16px;">🔒 กรุณาใส่รหัสเพื่อเข้าดูเว็บไซต์</p>
  <input id="gate-input" type="password" placeholder="รหัสผ่าน" autocomplete="off" style="padding:10px 14px;border-radius:8px;border:1px solid #30363d;background:#161b22;color:#e6edf3;font-size:14px;margin-bottom:14px;width:220px;text-align:center;">
  <br>
  <button id="gate-btn" style="padding:10px 28px;border-radius:8px;border:none;background:#58a6ff;color:#0d1117;font-weight:600;cursor:pointer;font-size:14px;">เข้าเว็บไซต์</button>
  <p id="gate-error" style="color:#f85149;font-size:13px;margin-top:12px;display:none;">รหัสไม่ถูกต้อง ลองใหม่อีกครั้ง</p>
</div>
<script>
(function(){
  var PASS = "Airplane";
  var overlay = document.getElementById('gate-overlay');
  if (sessionStorage.getItem('icq_gate_ok') === '1') {
    overlay.style.display = 'none';
  } else {
    document.getElementById('gate-btn').addEventListener('click', tryUnlock);
    document.getElementById('gate-input').addEventListener('keydown', function(e){
      if (e.key === 'Enter') tryUnlock();
    });
  }
  function tryUnlock(){
    var val = document.getElementById('gate-input').value;
    if (val === PASS) {
      sessionStorage.setItem('icq_gate_ok', '1');
      overlay.style.display = 'none';
    } else {
      document.getElementById('gate-error').style.display = 'block';
      document.getElementById('gate-input').value = '';
    }
  }
})();
</script>
<!-- ── จบส่วน password gate ── -->

<script>
/* ── SVG helpers ── */
function svgBond(x1,y1,x2,y2,dbl){
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  const nx=-dy/len*3,ny=dx/len*3;
  let s=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="currentColor" stroke-width="1.8"/>`;
  if(dbl) s+=`<line x1="${x1+nx}" y1="${y1+ny}" x2="${x2+nx}" y2="${y2+ny}" stroke="currentColor" stroke-width="1.8"/>`;
  return s;
}
function svgAtom(x,y,lbl,fill='#e8f0fa',textCol='#0c447c',r=14){
  return `<circle cx="${x}" cy="${y}" r="${r}" fill="${fill}" stroke="#185fa5" stroke-width="0.8"/>
<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="${textCol}">${lbl}</text>`;
}
function svgWrap(content,h=220){
  return `<div class="svg-wrap"><svg width="100%" viewBox="0 0 500 ${h}" style="max-height:${h}px">${content}</svg></div>`;
}

/* ── Steppers ── shared render engine ── */
function makeStepper(id, steps){
  /* steps = [{label,text,svg?}] */
  const dots=steps.map((_,i)=>`<div class="sdot" id="${id}-dot-${i}"></div>`).join('');
  const panels=steps.map((s,i)=>{
    const svgPart=s.svg?`<div class="svg-wrap">${s.svg}</div>`:'';
    return `<div class="stepper-step" id="${id}-step-${i}">
      <div class="step-label">${s.label}</div>
      <div class="step-text">${s.text}</div>
      ${svgPart}
    </div>`;
  }).join('');
  return `<div class="stepper" id="${id}">
    <div class="stepper-header">
      <span class="stepper-title">อธิบายทีละขั้น</span>
      <div class="stepper-dots">${dots}</div>
    </div>
    <div class="stepper-body">${panels}</div>
    <div class="stepper-nav">
      <button class="sbtn" id="${id}-prev" onclick="stepNav('${id}',-1)" disabled>← ก่อนหน้า</button>
      <span id="${id}-counter" style="font-size:12px;color:var(--muted);align-self:center">1/${steps.length}</span>
      <button class="sbtn pri" id="${id}-next" onclick="stepNav('${id}',1)">ถัดไป →</button>
    </div>
  </div>`;
}

/* ── Stepper state ── */
const stepState={};
function initStepper(id,total){
  stepState[id]={cur:0,total};
  showStep(id,0);
}
function stepNav(id,dir){
  const s=stepState[id]; if(!s) return;
  s.cur=Math.max(0,Math.min(s.total-1,s.cur+dir));
  showStep(id,s.cur);
}
function showStep(id,idx){
  const s=stepState[id]; if(!s) return;
  for(let i=0;i<s.total;i++){
    const el=document.getElementById(`${id}-step-${i}`);
    const dot=document.getElementById(`${id}-dot-${i}`);
    if(el) el.classList.toggle('on',i===idx);
    if(dot){dot.className='sdot'; if(i<idx)dot.classList.add('done'); if(i===idx)dot.classList.add('active');}
  }
  const ctr=document.getElementById(`${id}-counter`);
  const prev=document.getElementById(`${id}-prev`);
  const next=document.getElementById(`${id}-next`);
  if(ctr) ctr.textContent=`${idx+1}/${s.total}`;
  if(prev) prev.disabled=(idx===0);
  if(next){
    if(idx===s.total-1){next.textContent='✓ จบแล้ว';next.disabled=true;}
    else{next.textContent='ถัดไป →';next.disabled=false;}
  }
}

/* ════════════════════════════════════════════════

═══════════════════════════════════════════════ */

/* Q2019-4: mole fraction diagram */
function svgMoleFrac(){
  return `<svg width="100%" viewBox="0 0 500 160">
  <rect x="10" y="20" width="220" height="120" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="120" y="48" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Naphthalene</text>
  <text x="120" y="66" text-anchor="middle" font-size="11" fill="#0f6e56">0.527 g ÷ 128.174 g/mol</text>
  <text x="120" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">= 0.004112 mol</text>
  <rect x="260" y="20" width="220" height="120" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.8"/>
  <text x="370" y="48" text-anchor="middle" font-size="12" font-weight="600" fill="#26215c">Diphenylamine</text>
  <text x="370" y="66" text-anchor="middle" font-size="11" fill="#534ab7">1.264 g ÷ 169.227 g/mol</text>
  <text x="370" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#26215c">= 0.007469 mol</text>
  <text x="250" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#1a4d8f">χ(naph) = 0.004112 ÷ (0.004112+0.007469) = 0.355</text>
  </svg>`;
}

/* Q2019-6: balancing diagram */
function svgBalancing(){
  return `<svg width="100%" viewBox="0 0 500 160">
  <text x="20" y="30" font-size="12" font-weight="700" fill="#0c447c">A₃ + 3B₂ → 3AB₂</text>
  ${svgAtom(50,80,'A','#faeeda','#633806')} ${svgAtom(80,80,'A','#faeeda','#633806')} ${svgAtom(65,58,'A','#faeeda','#633806')}
  <text x="65" y="110" text-anchor="middle" font-size="10" fill="#706b5f">A₃</text>
  <text x="115" y="82" font-size="18" font-weight="700" fill="#706b5f">+</text>
  ${svgAtom(150,72,'B','#e1f5ee','#085041')} ${svgAtom(172,72,'B','#e1f5ee','#085041')}
  <text x="161" y="94" text-anchor="middle" font-size="10" fill="#706b5f">B₂</text>
  ${svgAtom(200,72,'B','#e1f5ee','#085041')} ${svgAtom(222,72,'B','#e1f5ee','#085041')}
  <text x="211" y="94" text-anchor="middle" font-size="10" fill="#706b5f">B₂</text>
  ${svgAtom(250,72,'B','#e1f5ee','#085041')} ${svgAtom(272,72,'B','#e1f5ee','#085041')}
  <text x="261" y="94" text-anchor="middle" font-size="10" fill="#706b5f">B₂</text>
  <text x="300" y="82" font-size="18" font-weight="700" fill="#706b5f">→</text>
  ${svgAtom(340,72,'A','#faeeda','#633806')} ${svgAtom(362,72,'B','#e1f5ee','#085041')} ${svgAtom(351,54,'B','#e1f5ee','#085041')}
  ${svgAtom(390,72,'A','#faeeda','#633806')} ${svgAtom(412,72,'B','#e1f5ee','#085041')} ${svgAtom(401,54,'B','#e1f5ee','#085041')}
  ${svgAtom(440,72,'A','#faeeda','#633806')} ${svgAtom(462,72,'B','#e1f5ee','#085041')} ${svgAtom(451,54,'B','#e1f5ee','#085041')}

/* Q2020-17: ionic radius isoelectronic */
function svgIonicRadius(){
  const ions=[
    {lbl:'Al³⁺',z:13,r:18,fill:'#e8f0fa',tc:'#0c447c'},
    {lbl:'Mg²⁺',z:12,r:24,fill:'#e8f0fa',tc:'#0c447c'},
    {lbl:'Na⁺', z:11,r:32,fill:'#f0ede5',tc:'#444441'},
    {lbl:'F⁻',  z:9, r:40,fill:'#eeedfe',tc:'#26215c'},
    {lbl:'O²⁻', z:8, r:50,fill:'#e1f5ee',tc:'#085041'},
  ];
  let s='';
  const cy=90;
  ions.forEach((ion,i)=>{
    const cx=50+i*95;
    s+=`<circle cx="${cx}" cy="${cy}" r="${ion.r}" fill="${ion.fill}" stroke="#aaa" stroke-width="0.8" opacity="0.9"/>`;
    s+=`<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="700" fill="${ion.tc}">${ion.lbl}</text>`;
    s+=`<text x="${cx}" y="${cy+ion.r+12}" text-anchor="middle" font-size="9" fill="#706b5f">Z=${ion.z}</text>`;
  });
  s+=`<text x="250" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#2a7a50">เพิ่ม Z → ดึงอิเล็กตรอนแน่น → รัศมีเล็กลง</text>`;
  s+=`<text x="250" y="183" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4d8f">O²⁻ &gt; F⁻ &gt; Na⁺ &gt; Mg²⁺ &gt; Al³⁺ ✓</text>`;
  return `<svg width="100%" viewBox="0 0 500 198">${s}</svg>`;
}

{yr:"2019",n:11,topic:"Ideal Gas",diff:"medium",
en:"To study weather phenomena sensors carried by balloons are used. What is the mass of helium that is needed to fill a 65 m³ balloon to a pressure of 1 atm at 25°C? Assume ideal gas behavior.",
th:"เซ็นเซอร์ที่ติดกับบอลลูนถูกใช้เพื่อศึกษาปรากฏการณ์ทางอุตุนิยมวิทยา มวลของ helium ที่ต้องใช้เพื่ออัดลูกโป่งขนาด 65 m³ ที่ความดัน 1 atm และ 25°C คือเท่าใด? (สมมติว่าเป็นแก๊สอุดมคติ)",
opts:["2.66 kg","0.105 g","11.61 g","10.63 kg","126.8 kg"],
ans:3,
exp_en:"<div class='ans-badge'>✓ d) 10.63 kg</div>n=PV/RT=65000/24.47=2658 mol → mass=10.63 kg",
exp_th:"<div class='ans-badge'>✓ d)</div>"+stpr("s11",[
  {label:"ขั้นที่ 1 — แปลงหน่วย",text:"V = 65 m³ = <b>65,000 L</b>  /  T = 25°C = 298 K",svg:svgIdealGas()},
  {label:"ขั้นที่ 2 — หา mol",text:"n = PV/RT = (1 × 65000) ÷ (0.08206 × 298) = <b>2658 mol</b>"},
  {label:"ขั้นที่ 3 — หามวล",text:"mass = 2658 × 4.003 = 10,640 g = <b>10.63 kg</b>"},
])},

  {label:"ขั้นที่ 1 — นับ C",text:"Monoterpene = isoprene 2 หน่วย = <b>C₁₀</b> เสมอ → ตัดตัวเลือก C₉ (a,d,e)",svg:svgAlphaPinene()},
  {label:"ขั้นที่ 2 — DoU",text:"DoU = (2×10+2−H)÷2 = 3 → H = 16 → <b>C₁₀H₁₆</b>"},
  {label:"ขั้นที่ 3 — ตรวจโครงสร้าง",text:"วง cyclohexene +1 / วง cyclobutane +1 / พันธะคู่ +1 = <b>3</b> ✓"},
])},

{yr:"2019",n:14,topic:"Stoichiometry",diff:"hard",
en:"A solution of tetrachloroethane (C₂H₂Cl₄) in cyclohexanone (C₆H₁₀O) is prepared with 29.3 mL of tetrachloroethane in 86.5 mL of cyclohexanone. What is the mole fraction of tetrachloroethane in the solution? Assume densities of 1.59 g/cm³ for tetrachloroethane and 0.948 g/cm³ for cyclohexanone.",
th:"สารละลาย tetrachloroethane (C₂H₂Cl₄) ใน cyclohexanone (C₆H₁₀O) เตรียมจาก tetrachloroethane 29.3 mL ใน cyclohexanone 86.5 mL มอลเฟรกชันของ tetrachloroethane ในสารละลายคือเท่าใด? (ความหนาแน่น: tetrachloroethane 1.59 g/cm³, cyclohexanone 0.948 g/cm³)",
opts:["0.249","0.165","0.751","0.835","0.181"],
ans:0,
exp_en:"<div class='ans-badge'>✓ a) 0.249</div>mol TCE=0.2775, mol CHX=0.8355 → χ=0.249",
exp_th:"<div class='ans-badge'>✓ a)</div>"+stpr("s14",[
  {label:"ขั้นที่ 1 — mol tetrachloroethane",text:"mass = 29.3 × 1.59 = 46.59 g<br>mol = 46.59 ÷ 167.85 = <b>0.2775 mol</b>"},
  {label:"ขั้นที่ 2 — mol cyclohexanone",text:"mass = 86.5 × 0.948 = 82.00 g<br>mol = 82.00 ÷ 98.14 = <b>0.8355 mol</b>"},
  {label:"ขั้นที่ 3 — χ",text:"χ = 0.2775 ÷ (0.2775+0.8355) = 0.2775 ÷ 1.113 = <b>0.249</b>"},
])},

en:"¹⁴C is eliminated from the body of a dead mammoth by a first order process that has a half-life of 5750 years. What percentage of the initial ¹⁴C would remain in the mammoth body after 11 500 years?",
th:"¹⁴C ถูกกำจัดออกจากร่างกายของแมมมอธที่ตายแล้วด้วยกระบวนการอันดับหนึ่งที่มีครึ่งชีวิต 5750 ปี ¹⁴C ร้อยละเท่าใดของปริมาณเริ่มต้นที่จะเหลืออยู่ในร่างกายของแมมมอธหลังจาก 11 500 ปี?",
opts:["0%","25%","50%","75%","2%"],
ans:1,
exp_en:"<div class='ans-badge'>✓ b) 25%</div>11500=2×t½ → (½)²=25%",
exp_th:"<div class='ans-badge'>✓ b)</div>"+stpr("s16",[
  {label:"นับจำนวนครึ่งชีวิต",text:"11,500 ÷ 5,750 = <b>2 ครึ่งชีวิต</b>",svg:svgRadioDecay()},
  {label:"คำนวณ",text:"N/N₀ = (½)² = 1/4 = <b>25%</b>"},
])},

{yr:"2019",n:20,topic:"Equilibrium",diff:"hard",
en:"When 7.41 g of solid Ca(OH)₂ (Molar mass = 74.09 g/mole, Ksp = 5.02×10⁻⁶) is dissolved into 1.00 L of water (assume there is no change in volume), the pH of the solution is closest to,",
th:"เมื่อ Ca(OH)₂ ของแข็ง 7.41 g (มวลโมลาร์ = 74.09 g/mol, Ksp = 5.02×10⁻⁶) ละลายในน้ำ 1.00 L (ปริมาตรไม่เปลี่ยนแปลง) pH ของสารละลายใกล้เคียงกับค่าใดมากที่สุด",
opts:["13.00","12.67","12.33","12.00","11.67"],
ans:2,
exp_en:"<div class=\'ans-badge\'>✓ c) 12.33</div>7.41 g ÷ 74.09 g/mol = 0.100 mol Ca(OH)₂ — exceeds solubility limit → saturated solution forms.<br><br>Ca(OH)₂ ⇌ Ca²⁺ + 2OH⁻ · Ksp = [Ca²⁺][OH⁻]² = 4s³<br>4s³ = 5.02×10⁻⁶ → s = 0.01079 M<br>[OH⁻] = 2s = 0.02158 M<br>pOH = −log(0.02158) = 1.666<br>pH = 14 − 1.666 = <b>12.33</b>",
exp_th:"<div class=\'ans-badge\'>✓ c) 12.33</div>"+stpr("s20",[
  {label:"ขั้นที่ 1 — ตรวจปริมาณ",text:"mol = 7.41÷74.09 = 0.100 mol เกินขีดละลาย → สารละลายอิ่มตัว"},
  {label:"ขั้นที่ 2 — Ksp",text:"Ca(OH)₂ ⇌ Ca²⁺ + 2OH⁻<br>Ksp = 4s³ = 5.02×10⁻⁶"},
  {label:"ขั้นที่ 3 — หา s",text:"s = ∛(5.02×10⁻⁶/4) = <b>0.01079 M</b>"},
  {label:"ขั้นที่ 4 — pH",text:"[OH⁻] = 2×0.01079 = 0.02158 M<br>pOH = 1.666 → pH = 14−1.666 = <b>12.33</b> ✓"},
])},

{yr:"Extra",n:19,topic:"Kinetics",diff:"hard",
en:"The Arrhenius equation describes the temperature dependence of rate constants: k = A·e^(−Ea/RT). A reaction has an activation energy Ea = 50 kJ/mol. If the rate constant doubles when the temperature increases from 300 K to T₂, what is T₂? (R = 8.314 J/mol·K)",
th:"สมการ Arrhenius อธิบายความสัมพันธ์ระหว่างค่าคงที่อัตราเร็วกับอุณหภูมิ: k = A·e^(−Ea/RT) ปฏิกิริยาหนึ่งมีพลังงานกระตุ้น Ea = 50 kJ/mol ถ้า k เพิ่มขึ้นเป็น 2 เท่าเมื่ออุณหภูมิเพิ่มจาก 300 K เป็น T₂ T₂ คือเท่าใด? (R = 8.314 J/mol·K)",
opts:["310 K","316 K","320 K","325 K","350 K"],
ans:1,
exp_en:"<div class='ans-badge'>✓ b) 316 K</div>ln2=(Ea/R)(1/T₁−1/T₂) → T₂≈311 K (nearest b)",
exp_th:"<div class='ans-badge'>✓ b)</div>"+stpr("s44",[
  {label:"สมการ Arrhenius",text:"ln(k₂/k₁) = (Ea/R)(1/T₁ − 1/T₂)<br>ln(2) = (50000/8.314)(1/300 − 1/T₂)"},
  {label:"แก้สมการ",text:"0.6931 = 6014.4 × (1/300 − 1/T₂)<br>1/T₂ = 3.333×10⁻³ − 1.153×10⁻⁴ = 3.218×10⁻³<br>T₂ ≈ <b>311 K</b> (ใกล้เคียง 316 K ในตัวเลือก)"},
])},

/* Q2020-20 */
{yr:"Extra",n:20,topic:"Equilibrium",diff:"hard",
en:"A buffer solution is prepared by dissolving CH₃COOH and CH₃COONa in water to give concentrations of 0.20 M and 0.10 M respectively. What is the pH of this buffer? (Ka of acetic acid = 1.8×10⁻⁵)",
th:"สารละลาย buffer เตรียมโดยละลาย CH₃COOH และ CH₃COONa ในน้ำให้มีความเข้มข้น 0.20 M และ 0.10 M ตามลำดับ pH ของ buffer นี้คือเท่าใด? (Ka ของ acetic acid = 1.8×10⁻⁵)",
opts:["4.44","4.74","5.04","3.74","5.44"],
ans:0,
exp_en:"<div class='ans-badge'>✓ a) 4.44</div>pH=4.745+log(0.1/0.2)=4.44",
exp_th:"<div class='ans-badge'>✓ a)</div>"+stpr("s45",[
  {label:"Henderson-Hasselbalch",text:"pH = pKa + log([A⁻]/[HA])"},
  {label:"แทนค่า",text:"pKa = −log(1.8×10⁻⁵) = 4.745<br>pH = 4.745 + log(0.10/0.20) = 4.745 + log(0.5) = 4.745 − 0.301 = <b>4.44</b>"},
])},

/* Q2020-21 */
{yr:"Extra",n:21,topic:"Organic",diff:"hard",
en:"1-Butene (CH₂=CHCH₂CH₃) reacts with HBr according to Markovnikov's rule. Which product is formed?",
th:"1-Butene (CH₂=CHCH₂CH₃) ทำปฏิกิริยากับ HBr ตามกฎ Markovnikov ได้ผลิตภัณฑ์ใด?",
opts:["1-bromobutane","2-bromobutane","1,2-dibromobutane","But-2-ene","But-1-ene"],
ans:1,
exp_en:"<div class='ans-badge'>✓ b) 2-bromobutane</div>H adds to C1 (less sub.), Br to C2 (Markovnikov).",
exp_th:"<div class='ans-badge'>✓ b)</div>"+stpr("s46",[
  {label:"โครงสร้าง 1-butene",text:"CH₂=CH−CH₂−CH₃"},
  {label:"กฎ Markovnikov",text:"H⁺ เติมที่ C ที่มี H <b>มากกว่า</b> = C1<br>Br⁻ เติมที่ C ที่มี H <b>น้อยกว่า</b> = C2<br>ผลิตภัณฑ์: CH₃−<b>CHBr</b>−CH₂−CH₃ = <b>2-bromobutane</b>"},
])},

/* Q2020-22 */
{yr:"Extra",n:22,topic:"Electrochemistry",diff:"medium",
en:"How long (in seconds) does it take to deposit 1.08 g of silver (M = 107.87 g/mol) from a AgNO₃ solution using a constant current of 2.00 A? (Faraday constant F = 96,485 C/mol; Ag⁺ + e⁻ → Ag)",
th:"ต้องใช้เวลากี่วินาทีเพื่อชุบเงิน 1.08 g (M = 107.87 g/mol) จากสารละลาย AgNO₃ โดยใช้กระแสไฟฟ้าคงที่ 2.00 A? (F = 96,485 C/mol; Ag⁺ + e⁻ → Ag)",
opts:["482 s","965 s","241 s","1930 s","4826 s"],
ans:0,
exp_en:"<div class='ans-badge'>✓ a) 482 s</div>mol Ag=0.01001 → Q=965.7C → t=482s",
exp_th:"<div class='ans-badge'>✓ a)</div>"+stpr("s47",[
  {label:"ขั้นที่ 1 — mol Ag",text:"mol = 1.08 ÷ 107.87 = <b>0.01001 mol</b>"},
  {label:"ขั้นที่ 2 — ประจุ",text:"Ag⁺+e⁻→Ag (1 mol e⁻ ต่อ mol Ag)<br>Q = 0.01001 × 96485 = <b>965.7 C</b>"},
  {label:"ขั้นที่ 3 — เวลา",text:"t = Q/I = 965.7 ÷ 2.00 = <b>482.8 ≈ 482 s</b>"},
])},

opts:["All C-C bonds equal length","Readily undergoes addition","Contains delocalized π electrons","Planar ring","Typically undergoes electrophilic substitution"],

  {label:"ทำไมไม่ทำ addition?",text:"Addition จะทำลาย aromaticity (6π electrons ที่เสถียรมาก)<br>benzene ชอบ <b>แทนที่ (substitution)</b> เพื่อรักษา aromatic ring ✓"},

/* ═══════════ ENGINE ═══════════ */
const TOPICS=[...new Set(QS.map(q=>q.topic))];
let cur=0;
let answered=new Array(QS.length).fill(null);
let chosen=new Array(QS.length).fill(null);
let expLang=new Array(QS.length).fill("en");
let yearFilter="all";

function filtered(){
  if(yearFilter==="all") return QS.map((_,i)=>i);
  return QS.map((_,i)=>i).filter(i=>QS[i].yr===yearFilter);
}
function updateHeader(){
  const done=answered.filter(a=>a!==null).length;
  const corr=answered.filter((a,i)=>a!==null&&a===QS[i].ans).length;
  document.getElementById('h-done').textContent=done;
  document.getElementById('h-corr').textContent=corr;
  document.getElementById('h-wrong').textContent=done-corr;
  const fi=filtered();
  const fdone=fi.filter(i=>answered[i]!==null).length;
  document.getElementById('prog-fill').style.width=(fdone/fi.length*100)+'%';
  document.getElementById('prog-val').textContent=fdone+'/'+fi.length;
}
function setYear(y){
  yearFilter=y;
  ['all','2019','2020'].forEach(t=>{document.getElementById('tab-'+t).classList.toggle('active',t===y);});
  const fi=filtered();
  if(!fi.includes(cur)) cur=fi[0];
  renderAll();
}
function renderNav(){
  const fi=filtered();
  document.getElementById('qnav').innerHTML=fi.map(i=>{
    let cls='qdot';
    if(i===cur)cls+=' cur';
    else if(answered[i]!==null)cls+=answered[i]===QS[i].ans?' ok':' ng';
    const lbl=QS[i].yr==='2019'?QS[i].n:(QS[i].n+25);
    return `<button class="${cls}" onclick="go(${i})" title="Q${lbl}: ${QS[i].topic}">${lbl}</button>`;
  }).join('');
}
function renderQ(){
  const q=QS[cur];
  const fi=filtered();
  const ltrs=['a','b','c','d','e'];
  const isAns=answered[cur]!==null;
  const lang=expLang[cur];
  const lbl=q.yr==='2019'?q.n:(q.n+25);
  let optsH=q.opts.map((o,i)=>{
    let cls='opt';
    if(isAns){if(i===q.ans)cls+=' show-correct';if(i===chosen[cur]&&chosen[cur]!==q.ans)cls+=' wrong';if(i===chosen[cur]&&chosen[cur]===q.ans)cls+=' correct';}
    return `<button class="${cls}" ${isAns?'disabled':''} onclick="pick(${i})"><span class="ltr">${ltrs[i]})</span><span>${o}</span></button>`;
  }).join('');
  const expShow=isAns?' show':'';
  const enA=lang==='en'?' active':'';
  const thA=lang==='th'?' active':'';
  document.getElementById('qarea').innerHTML=`
<div class="qcard">
  <div class="qmeta">
    <span class="qnum">Q${lbl}</span>
    <span class="qyear">${q.yr}</span>
    <span class="qtag">${q.topic}</span>
    <span class="qdiff ${q.diff}">${{easy:'Easy',medium:'Medium',hard:'Hard'}[q.diff]}</span>
  </div>
  <div class="qen">${q.en}</div>
  <div class="qth">${q.th}</div>
  <div class="opts">${optsH}</div>
  <div class="expbox${expShow}">
    <div class="exphdr">
      Explanation / เฉลย
      <button class="elang${enA}" onclick="setLang(${cur},'en')">EN</button>
      <button class="elang${thA}" onclick="setLang(${cur},'th')">TH ภาษาไทย</button>
    </div>
    <div class="expbody">
      <div class="exp-en${lang==='en'?' on':''}">${q.exp_en}</div>
      <div class="exp-th${lang==='th'?' on':''}">${q.exp_th}</div>
    </div>
  </div>
</div>`;
  if(isAns){
    const sid='s'+(cur+1);
    if(stepState[sid]===undefined&&document.getElementById(sid)){
      const steps=document.querySelectorAll(`#${sid} .stepper-step`).length;
      initStepper(sid,steps);
    }
  }
  const pos=fi.indexOf(cur);
  document.getElementById('nav-lbl').textContent=`${pos+1} / ${fi.length}`;
  document.getElementById('btn-prev').disabled=(pos===0);
  const btnNext=document.getElementById('btn-next');
  if(pos===fi.length-1){btnNext.textContent='ดูผลรวม →';btnNext.onclick=showResult;}
  else{btnNext.textContent='Next →';btnNext.onclick=()=>go(fi[pos+1]);}
}
function setLang(i,l){
  expLang[i]=l;
  renderQ();
  const sid='s'+(i+1);
  if(document.getElementById(sid)){
    const steps=document.querySelectorAll(`#${sid} .stepper-step`).length;
    initStepper(sid,steps);
  }
}
function pick(i){
  if(answered[cur]!==null)return;
  chosen[cur]=i;answered[cur]=i;
  renderNav();renderQ();updateHeader();
  const sid='s'+(cur+1);
  if(expLang[cur]==='th'&&document.getElementById(sid)){
    const steps=document.querySelectorAll(`#${sid} .stepper-step`).length;
    initStepper(sid,steps);
  }
}
function go(i){if(i<0||i>=QS.length)return;cur=i;renderAll();}
function renderAll(){renderNav();renderQ();updateHeader();}
function showResult(){
  document.getElementById('quiz-view').classList.add('hidden');
  const rv=document.getElementById('result-view');rv.classList.remove('hidden');
  const fi=filtered();
  const corr=fi.filter(i=>answered[i]===QS[i].ans).length;
  const done=fi.filter(i=>answered[i]!==null).length;
  const pct=Math.round(corr/fi.length*100);
  const msg=pct>=80?'เยี่ยมมาก! 🎉':pct>=60?'ดีมาก ทบทวนข้อที่ผิดด้วยนะ 👍':'ลองทบทวนแล้วทำใหม่อีกรอบ 📚';
  const y19=QS.map((_,i)=>i).filter(i=>QS[i].yr==='2019');
  const y20=QS.map((_,i)=>i).filter(i=>QS[i].yr==='Extra');
  const c19=y19.filter(i=>answered[i]===QS[i].ans).length;
  const c20=y20.filter(i=>answered[i]===QS[i].ans).length;
  const d19=y19.filter(i=>answered[i]!==null).length;
  const d20=y20.filter(i=>answered[i]!==null).length;
  let topicRows=TOPICS.map(t=>{
    const ti=QS.map((_,i)=>i).filter(i=>QS[i].topic===t);
    const tc=ti.filter(i=>answered[i]===QS[i].ans).length;
    const pt=Math.round(tc/ti.length*100);
    return `<div class="trow"><div class="tname">${t}</div><div class="tbar"><div class="tbfill" style="width:${pt}%"></div></div><div class="tpct">${tc}/${ti.length}</div></div>`;
  }).join('');
  rv.innerHTML=`
<div class="big">${corr}<span class="total">/${fi.length}</span></div>
<div class="msg">${msg}</div>
<div class="rgrid">
  <div class="rstat"><div class="n" style="color:var(--green)">${corr}</div><div class="l">ถูก</div></div>
  <div class="rstat"><div class="n" style="color:var(--red)">${done-corr}</div><div class="l">ผิด</div></div>
  <div class="rstat"><div class="n">${pct}%</div><div class="l">คะแนน</div></div>
</div>
<div class="tbreak">
  <h3>By Year</h3>
  <div class="trow"><div class="tname">2019</div><div class="tbar"><div class="tbfill" style="width:${d19>0?Math.round(c19/25*100):0}%"></div></div><div class="tpct">${c19}/25</div></div>
  <div class="trow"><div class="tname">Extra</div><div class="tbar"><div class="tbfill" style="width:${d20>0?Math.round(c20/25*100):0}%"></div></div><div class="tpct">${c20}/25</div></div>
</div>
<div class="tbreak"><h3>By Topic</h3>${topicRows}</div>
<button class="btn pri" onclick="restart()" style="padding:12px 32px;font-size:15px;margin-bottom:10px">ทำใหม่</button><br>
<button class="btn" onclick="reviewWrong()" style="font-size:13px">ทบทวนข้อที่ผิด</button>`;
}
function restart(){
  answered=new Array(QS.length).fill(null);chosen=new Array(QS.length).fill(null);
  expLang=new Array(QS.length).fill("en");
  Object.keys(stepState).forEach(k=>delete stepState[k]);
  cur=filtered()[0];
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('quiz-view').classList.remove('hidden');
  renderAll();
}
function reviewWrong(){
  const fi=filtered();
  const wrong=fi.filter(i=>answered[i]!==null&&answered[i]!==QS[i].ans);
  if(!wrong.length){alert('ไม่มีข้อผิด! 🎉');return;}
  cur=wrong[0];
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('quiz-view').classList.remove('hidden');
  renderAll();
}

cur=filtered()[0];
document.getElementById('cnt-all').textContent=QS.length;
document.getElementById('cnt-2019').textContent=QS.filter(q=>q.yr==='2019').length;
document.getElementById('cnt-2020').textContent=QS.filter(q=>q.yr==='Extra').length;
renderAll();
</script>
</body>
</html>
